<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gracia y Coraje — Ken Wilber</title>
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C5A059;
    --gold-dark: #A07838;
    --bg: #1a1410;
    --bg2: #120e0a;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:antialiased; }

  body {
    background: var(--bg);
    font-family: 'Josefin Sans', sans-serif;
    color: #fff;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    user-select: none;
  }

  /* ══ Header ══ */
  .fb-header {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 20px;
    background: rgba(26,20,16,0.95);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(197,160,89,0.25);
    flex-shrink: 0;
    box-shadow: 0 2px 20px rgba(0,0,0,0.4);
    z-index: 10;
  }
  .fb-back {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(197,160,89,0.1);
    border: 1px solid rgba(197,160,89,0.3);
    color: var(--gold); font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    flex-shrink: 0;
  }
  .fb-back:hover { background: var(--gold); color: #1a1410; transform: scale(1.1); }
  .fb-info { flex: 1; }
  .fb-title { font-size: 12px; letter-spacing: 3px; color: var(--gold); text-transform: uppercase; font-weight: 700; }
  .fb-author { font-size: 11px; color: rgba(197,160,89,0.5); font-style: italic; font-family: 'Cormorant Garamond', serif; margin-top: 2px; }
  .fb-pages { font-size: 10px; letter-spacing: 2px; color: rgba(197,160,89,0.4); font-weight: 600; }

  /* ══ Área del libro ══ */
  .fb-stage {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    background: url('Fondo/Tramado.png') center center / cover no-repeat;
  }

  /* ══ Loading ══ */
  .fb-loading {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 20px; z-index: 20;
    background: radial-gradient(ellipse at center, #2a1e14 0%, #120e0a 70%);
  }
  .fb-loading.hidden { display: none; }
  .load-spinner {
    width: 50px; height: 50px;
    border: 2px solid rgba(197,160,89,0.2);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .load-text {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic; font-size: 16px;
    color: rgba(197,160,89,0.6);
    letter-spacing: 1px;
  }
  .load-progress {
    width: 200px; height: 2px;
    background: rgba(197,160,89,0.15);
    border-radius: 1px; overflow: hidden;
  }
  .load-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--gold-dark), var(--gold));
    border-radius: 1px;
    width: 0%;
    transition: width 0.3s ease;
  }

  /* ══ StPageFlip container ══ */
  #flipbook-container {
    display: none;
    position: relative;
  }

  /* Lomo dorado encima del flipbook */
  .book-spine-overlay {
    position: absolute;
    top: 0; bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 12px;
    background: linear-gradient(90deg, #8a6020, #c5a059, #8a6020);
    z-index: 10;
    box-shadow: 0 0 15px rgba(197,160,89,0.4);
    pointer-events: none;
  }

  /* ══ Flechas laterales ══ */
  .fb-arrow-left, .fb-arrow-right {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 48px; height: 48px; border-radius: 50%;
    background: rgba(26,20,16,0.7);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(197,160,89,0.2);
    color: var(--gold); font-size: 22px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 15;
    opacity: 0.6;
  }
  .fb-arrow-left { left: 20px; }
  .fb-arrow-right { right: 20px; }
  .fb-arrow-left:hover, .fb-arrow-right:hover { opacity: 1; background: rgba(197,160,89,0.2); transform: translateY(-50%) scale(1.1); }
  .fb-arrow-left:disabled, .fb-arrow-right:disabled { opacity: 0.15; cursor: default; pointer-events: none; }

  /* ══ Zoom hint ══ */
  .zoom-hint {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    font-size: 9px; letter-spacing: 2px; color: rgba(197,160,89,0.3);
    text-transform: uppercase; pointer-events: none;
    font-family: 'Josefin Sans', sans-serif;
  }

  /* ══ Controles ══ */
  .fb-controls {
    display: flex; align-items: center; justify-content: center;
    gap: 16px; padding: 14px 20px;
    background: rgba(26,20,16,0.95);
    backdrop-filter: blur(20px);
    border-top: 1px solid rgba(197,160,89,0.15);
    flex-shrink: 0;
  }
  .fb-btn {
    width: 44px; height: 44px; border-radius: 50%;
    background: rgba(197,160,89,0.1);
    border: 1px solid rgba(197,160,89,0.25);
    color: var(--gold); font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
  }
  .fb-btn:hover:not(:disabled) { background: var(--gold); color: #1a1410; transform: scale(1.1); box-shadow: 0 4px 16px rgba(197,160,89,0.4); }
  .fb-btn:disabled { opacity: 0.25; cursor: default; }

  .fb-page-info {
    font-family: 'Josefin Sans', sans-serif;
    font-size: 10px; letter-spacing: 3px;
    color: rgba(197,160,89,0.5); text-transform: uppercase;
    min-width: 120px; text-align: center;
  }

  .fb-fullscreen {
    width: 36px; height: 36px; border-radius: 8px;
    background: rgba(197,160,89,0.08);
    border: 1px solid rgba(197,160,89,0.2);
    color: rgba(197,160,89,0.5); font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s ease;
  }
  .fb-fullscreen:hover { color: var(--gold); background: rgba(197,160,89,0.15); }

  /* ══ StPageFlip overrides ══ */
  .stf__parent {
    background: transparent !important;
  }
  .stf__block {
    box-shadow: none !important;
  }
</style>
</head>
<body>

<!-- Header -->
<div class="fb-header">
  <button class="fb-back" onclick="window.history.back()" title="Volver">←</button>
  <div class="fb-info">
    <div class="fb-title">Gracia y Coraje</div>
    <div class="fb-author">Ken Wilber</div>
  </div>
  <div class="fb-pages" id="fbPagesInfo">— / —</div>
  <button class="fb-fullscreen" onclick="zoomOut()" title="Alejar">−</button>
  <button class="fb-fullscreen" onclick="zoomReset()" title="Zoom normal">⊙</button>
  <button class="fb-fullscreen" onclick="zoomIn()" title="Acercar">+</button>
  <button class="fb-fullscreen" onclick="toggleFullscreen()" title="Pantalla completa">⛶</button>
</div>

<!-- Área del libro -->
<div class="fb-stage" id="fbStage">

  <!-- Loading -->
  <div class="fb-loading" id="fbLoading">
    <div class="load-spinner"></div>
    <div class="load-text" id="loadText">Cargando libro...</div>
    <div class="load-progress"><div class="load-bar" id="loadBar"></div></div>
  </div>

  <!-- Flechas laterales -->
  <button class="fb-arrow-left" id="arrowLeft" onclick="prevPage()" disabled>‹</button>
  <button class="fb-arrow-right" id="arrowRight" onclick="nextPage()" disabled>›</button>

  <!-- StPageFlip container -->
  <div id="flipbook-container">
    <div class="book-spine-overlay" id="spineOverlay"></div>
    <div id="flipbook"></div>
  </div>

  <div class="zoom-hint" id="zoomHint">usa las flechas o teclas ← → para navegar</div>
</div>

<!-- Controles -->
<div class="fb-controls">
  <button class="fb-btn" id="btnFirst" onclick="goToPage(0)" disabled title="Primera página">«</button>
  <button class="fb-btn" id="btnPrev" onclick="prevPage()" disabled title="Anterior">‹</button>
  <div class="fb-page-info" id="pageInfo">— / —</div>
  <button class="fb-btn" id="btnNext" onclick="nextPage()" disabled title="Siguiente">›</button>
  <button class="fb-btn" id="btnLast" onclick="goToPage(9999)" disabled title="Última página">»</button>
</div>

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<!-- StPageFlip -->
<script src="https://unpkg.com/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>

<script>
  const params  = new URLSearchParams(window.location.search);
  const PDF_URL = params.get('url') || 'https://pub-fc46ecd1c6b8484494c1513716440500.r2.dev/Biblioteca/KEN%20WILBER/Ken-Wilber-Gracia-Y-Coraje-.pdf';
  const TITULO  = params.get('titulo') || 'Gracia y Coraje';
  const AUTOR   = params.get('autor')  || 'Ken Wilber';

  document.querySelector('.fb-title').textContent  = TITULO;
  document.querySelector('.fb-author').textContent = AUTOR;

  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  let pdfDoc     = null;
  let totalPages = 0;
  let pageFlip   = null;
  let pageWidth  = 0, pageHeight = 0;
  let zoomLevel  = 1.0;
  let translateX = 0, translateY = 0;
  let isDragging = false, dragStartX = 0, dragStartY = 0;

  const loadBar   = document.getElementById('loadBar');
  const loadText  = document.getElementById('loadText');
  const pageInfo  = document.getElementById('pageInfo');
  const pagesInfo = document.getElementById('fbPagesInfo');
  const fbStageEl = document.getElementById('fbStage');
  const flipbookContainer = document.getElementById('flipbook-container');

  /* ══ Calcular tamaño del libro ══ */
  function calcBookSize() {
    const stage  = document.getElementById('fbStage');
    const sw     = stage.clientWidth;
    const sh     = stage.clientHeight - 20;
    const ratio  = pageHeight / pageWidth;
    const isMobile = sw < 1024;

    if (isMobile) {
      let w = sw - 20;
      let h = w * ratio;
      if (h > sh) { h = sh; w = h / ratio; }
      return { w: Math.floor(w), h: Math.floor(h), mobile: true };
    } else {
      let w = Math.min((sw - 80) / 2, sh / ratio);
      let h = w * ratio;
      if (h > sh) { h = sh; w = h / ratio; }
      return { w: Math.floor(w), h: Math.floor(h), mobile: false };
    }
  }

  /* ══ Renderizar todas las páginas del PDF a canvases ══ */
  async function renderAllPages() {
    const { w, h, mobile } = calcBookSize();
    const dpr = window.devicePixelRatio || 1;
    const renderScale = dpr * 1;
    const canvases = [];

    for (let i = 1; i <= totalPages; i++) {
      loadText.textContent = `Renderizando página ${i} de ${totalPages}...`;
      loadBar.style.width = Math.round((i / totalPages) * 100) + '%';

      const page     = await pdfDoc.getPage(i);
      const vp       = page.getViewport({ scale: 1 });
      const scale    = (w * renderScale) / vp.width;
      const viewport = page.getViewport({ scale });

      const canvas  = document.createElement('canvas');
      canvas.width  = viewport.width;
      canvas.height = viewport.height;
      canvas.style.width  = w + 'px';
      canvas.style.height = h + 'px';

      await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
      canvases.push(canvas);
    }

    return { canvases, w, h, mobile };
  }

  /* ══ Inicializar StPageFlip ══ */
  function initFlipbook(canvases, w, h, mobile) {
    const flipbookEl = document.getElementById('flipbook');
    flipbookEl.innerHTML = '';

    // Agregar portada vacía si es necesario para alinear páginas
    canvases.forEach((canvas, i) => {
      const page = document.createElement('div');
      page.className = 'flip-page';
      page.style.cssText = `
        width:${w}px; height:${h}px;
        background:#f5f0e8;
        overflow:hidden;
      `;
      page.appendChild(canvas);
      flipbookEl.appendChild(page);
    });

    const bookWidth  = mobile ? w : w * 2;
    const bookHeight = h;

    // Ajustar contenedor
    flipbookContainer.style.width  = bookWidth + 'px';
    flipbookContainer.style.height = bookHeight + 'px';

    // Lomo solo en desktop
    const spine = document.getElementById('spineOverlay');
    spine.style.display = mobile ? 'none' : 'block';
    spine.style.height  = h + 'px';

    pageFlip = new St.PageFlip(flipbookEl, {
      width:        w,
      height:       h,
      size:         'fixed',
      minWidth:     w,
      maxWidth:     w,
      minHeight:    h,
      maxHeight:    h,
      showCover:    false,
      drawShadow:   true,
      flippingTime: 650,
      usePortrait:  mobile,
      startZIndex:  1,
      autoSize:     false,
      mobileScrollSupport: false,
      clickEventForward: true,
      useMouseEvents: true,
      swipeDistance: 70,
      showPageCorners: true,
      disableFlipByClick: false,
    });

    pageFlip.loadFromHTML(document.querySelectorAll('.flip-page'));

    pageFlip.on('flip', (e) => {
      updateControls(e.data);
    });

    pageFlip.on('changeState', () => {
      updateControls(pageFlip.getCurrentPageIndex());
    });

    flipbookContainer.style.display = 'block';
    updateControls(0);
  }

  /* ══ Actualizar controles ══ */
  function updateControls(pageIndex) {
    if (!pageFlip) return;
    const current = pageIndex + 1;
    const total   = totalPages;

    pageInfo.textContent  = `${current} — ${Math.min(current + 1, total)} / ${total}`;
    pagesInfo.textContent = `${current}–${Math.min(current + 1, total)} / ${total}`;

    document.getElementById('btnPrev').disabled   = pageIndex <= 0;
    document.getElementById('btnFirst').disabled  = pageIndex <= 0;
    document.getElementById('arrowLeft').disabled  = pageIndex <= 0;

    const atEnd = pageIndex >= totalPages - 2;
    document.getElementById('btnNext').disabled   = atEnd;
    document.getElementById('btnLast').disabled   = atEnd;
    document.getElementById('arrowRight').disabled = atEnd;
  }

  /* ══ Navegación ══ */
  function nextPage() { if (pageFlip) pageFlip.flipNext(); }
  function prevPage() { if (pageFlip) pageFlip.flipPrev(); }
  function goToPage(n) {
    if (!pageFlip) return;
    if (n === 0) pageFlip.flip(0);
    else if (n === 9999) pageFlip.flip(totalPages - 1);
    else pageFlip.flip(n);
  }

  /* ══ Teclado ══ */
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nextPage();
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   prevPage();
  });

  /* ══ Touch swipe ══ */
  let touchX = 0;
  document.addEventListener('touchstart', e => {
    if (e.touches.length === 1) touchX = e.touches[0].clientX;
  }, { passive: true });
  document.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchX;
    if (Math.abs(dx) > 60) { dx < 0 ? nextPage() : prevPage(); }
  });

  /* ══ Zoom ══ */
  function applyTransform() {
    flipbookContainer.style.transform =
      `scale(${zoomLevel}) translate(${translateX / zoomLevel}px, ${translateY / zoomLevel}px)`;
    flipbookContainer.style.transformOrigin = 'center center';
  }

  function zoomIn() {
    zoomLevel = Math.min(zoomLevel + 0.25, 3.0);
    fbStageEl.style.cursor = 'grab';
    applyTransform();
  }
  function zoomOut() {
    zoomLevel = Math.max(zoomLevel - 0.25, 0.5);
    if (zoomLevel === 1) { translateX = 0; translateY = 0; fbStageEl.style.cursor = 'default'; }
    applyTransform();
  }
  function zoomReset() {
    zoomLevel = 1.0;
    translateX = 0; translateY = 0;
    fbStageEl.style.cursor = 'default';
    applyTransform();
  }

  /* ══ Drag mouse ══ */
  fbStageEl.addEventListener('mousedown', e => {
    if (zoomLevel <= 1) return;
    e.preventDefault();
    isDragging = true;
    dragStartX = e.clientX - translateX;
    dragStartY = e.clientY - translateY;
    fbStageEl.style.cursor = 'grabbing';
  });
  window.addEventListener('mousemove', e => {
    if (!isDragging) return;
    translateX = e.clientX - dragStartX;
    translateY = e.clientY - dragStartY;
    applyTransform();
  });
  window.addEventListener('mouseup', () => {
    if (!isDragging) return;
    isDragging = false;
    fbStageEl.style.cursor = zoomLevel > 1 ? 'grab' : 'default';
  });

  /* ══ Drag touch ══ */
  let lastPinchDist = 0;
  fbStageEl.addEventListener('touchstart', e => {
    if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      lastPinchDist = Math.sqrt(dx*dx + dy*dy);
    } else if (zoomLevel > 1 && e.touches.length === 1) {
      isDragging = true;
      dragStartX = e.touches[0].clientX - translateX;
      dragStartY = e.touches[0].clientY - translateY;
    }
  }, { passive: true });

  fbStageEl.addEventListener('touchmove', e => {
    if (e.touches.length === 2 && lastPinchDist > 0) {
      e.preventDefault();
      const dx   = e.touches[0].clientX - e.touches[1].clientX;
      const dy   = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.sqrt(dx*dx + dy*dy);
      zoomLevel  = Math.min(Math.max(zoomLevel * (dist / lastPinchDist), 0.5), 3.0);
      lastPinchDist = dist;
      applyTransform();
    } else if (isDragging && e.touches.length === 1) {
      translateX = e.touches[0].clientX - dragStartX;
      translateY = e.touches[0].clientY - dragStartY;
      applyTransform();
    }
  }, { passive: false });

  fbStageEl.addEventListener('touchend', e => {
    if (e.touches.length === 0) { isDragging = false; lastPinchDist = 0; }
  });

  /* ══ Pantalla completa ══ */
  function toggleFullscreen() {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
    else document.exitFullscreen?.();
  }

  /* ══ Resize ══ */
  window.addEventListener('resize', () => {
    if (pdfDoc) {
      zoomReset();
      // Re-inicializar con nuevo tamaño
      document.getElementById('fbLoading').classList.remove('hidden');
      flipbookContainer.style.display = 'none';
      renderAllPages().then(({ canvases, w, h, mobile }) => {
        initFlipbook(canvases, w, h, mobile);
        document.getElementById('fbLoading').classList.add('hidden');
      });
    }
  });

  /* ══ Cargar PDF ══ */
  async function loadPDF() {
    try {
      const loadingTask = pdfjsLib.getDocument({
        url: PDF_URL,
        cMapUrl: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/cmaps/',
        cMapPacked: true,
      });

      loadingTask.onProgress = ({ loaded, total }) => {
        if (total > 0) {
          loadBar.style.width = Math.round((loaded / total) * 80) + '%';
          loadText.textContent = 'Descargando libro...';
        }
      };

      pdfDoc     = await loadingTask.promise;
      totalPages = pdfDoc.numPages;

      const firstPage = await pdfDoc.getPage(1);
      const vp        = firstPage.getViewport({ scale: 1 });
      pageWidth       = vp.width;
      pageHeight      = vp.height;

      // Renderizar todas las páginas
      const { canvases, w, h, mobile } = await renderAllPages();

      // Inicializar flipbook
      initFlipbook(canvases, w, h, mobile);

      document.getElementById('fbLoading').classList.add('hidden');

      // Habilitar controles
      document.getElementById('btnNext').disabled   = false;
      document.getElementById('btnLast').disabled   = false;
      document.getElementById('arrowRight').disabled = false;

    } catch (err) {
      console.error('Error cargando PDF:', err);
      document.getElementById('fbLoading').innerHTML = `
        <div style="text-align:center;padding:20px;">
          <div style="font-size:32px;margin-bottom:16px;">📖</div>
          <div style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:16px;color:rgba(197,160,89,0.6);">
            No se pudo cargar el libro.<br>Verifica tu conexión.
          </div>
        </div>`;
    }
  }

  loadPDF();
</script>
</body>
</html>
