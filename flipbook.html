<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gracia y Coraje — Ken Wilber</title>
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C5A059;
    --gold-dark: #A07838;
    --bg: #1a1410;
    --bg2: #120e0a;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:antialiased; }

  body {
    background: var(--bg);
    font-family: 'Josefin Sans', sans-serif;
    color: #fff;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    user-select: none;
  }

  /* ══ Header ══ */
  .fb-header {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 20px;
    background: rgba(26,20,16,0.95);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(197,160,89,0.25);
    flex-shrink: 0;
    box-shadow: 0 2px 20px rgba(0,0,0,0.4);
    z-index: 10;
  }
  .fb-back {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(197,160,89,0.1);
    border: 1px solid rgba(197,160,89,0.3);
    color: var(--gold); font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    flex-shrink: 0;
  }
  .fb-back:hover { background: var(--gold); color: #1a1410; transform: scale(1.1); }
  .fb-info { flex: 1; }
  .fb-title { font-size: 12px; letter-spacing: 3px; color: var(--gold); text-transform: uppercase; font-weight: 700; }
  .fb-author { font-size: 11px; color: rgba(197,160,89,0.5); font-style: italic; font-family: 'Cormorant Garamond', serif; margin-top: 2px; }
  .fb-pages { font-size: 10px; letter-spacing: 2px; color: rgba(197,160,89,0.4); font-weight: 600; }

  /* ══ Área del libro ══ */
  .fb-stage {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    background: radial-gradient(ellipse at center, #2a1e14 0%, #120e0a 70%);
  }

  /* Sombra del suelo */
  .fb-stage::after {
    content: '';
    position: absolute;
    bottom: 10%;
    left: 50%;
    transform: translateX(-50%);
    width: 60%;
    height: 40px;
    background: rgba(0,0,0,0.5);
    filter: blur(20px);
    border-radius: 50%;
    pointer-events: none;
  }

  /* ══ Libro 3D ══ */
  .book-3d {
    position: relative;
    transform-style: preserve-3d;
    perspective: 2000px;
  }

  .book-container {
    position: relative;
    transform-style: preserve-3d;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Página izquierda */
  .page-left {
    position: relative;
    background: #f5f0e8;
    border-radius: 2px 0 0 2px;
    overflow: hidden;
    box-shadow: -4px 0 20px rgba(0,0,0,0.4);
    transform-origin: right center;
    backface-visibility: hidden;
  }

  /* Página derecha */
  .page-right {
    position: relative;
    background: #f5f0e8;
    border-radius: 0 2px 2px 0;
    overflow: hidden;
    box-shadow: 4px 0 20px rgba(0,0,0,0.4);
    transform-origin: left center;
    backface-visibility: hidden;
  }

  .page-left canvas,
  .page-right canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  /* Lomo del libro */
  .book-spine {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    width: 12px;
    height: 100%;
    background: linear-gradient(90deg, #8a6020, #c5a059, #8a6020);
    z-index: 5;
    box-shadow: 0 0 15px rgba(197,160,89,0.3);
  }

  /* Sombra interior de páginas */
  .page-left::after {
    content: '';
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 30px;
    background: linear-gradient(to left, rgba(0,0,0,0.15), transparent);
    pointer-events: none;
    z-index: 2;
  }
  .page-right::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 30px;
    background: linear-gradient(to right, rgba(0,0,0,0.15), transparent);
    pointer-events: none;
    z-index: 2;
  }

  /* ══ Animación de volteo ══ */
  .page-flip {
    position: absolute;
    background: #f5f0e8;
    transform-origin: left center;
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(0.645, 0.045, 0.355, 1.000);
    z-index: 10;
    overflow: hidden;
    box-shadow: 4px 0 20px rgba(0,0,0,0.3);
  }
  .page-flip canvas {
    display: block;
    width: 100%;
    height: 100%;
  }
  .page-flip.flipping-forward {
    animation: flipForward 0.65s cubic-bezier(0.645, 0.045, 0.355, 1.000) forwards;
  }
  .page-flip.flipping-back {
    animation: flipBack 0.65s cubic-bezier(0.645, 0.045, 0.355, 1.000) forwards;
  }

  @keyframes flipForward {
    0%   { transform: perspective(2000px) rotateY(0deg); box-shadow: 4px 0 20px rgba(0,0,0,0.3); }
    50%  { transform: perspective(2000px) rotateY(-90deg); box-shadow: 20px 0 40px rgba(0,0,0,0.5); }
    100% { transform: perspective(2000px) rotateY(-180deg); box-shadow: -4px 0 20px rgba(0,0,0,0.3); }
  }
  @keyframes flipBack {
    0%   { transform: perspective(2000px) rotateY(-180deg); box-shadow: -4px 0 20px rgba(0,0,0,0.3); }
    50%  { transform: perspective(2000px) rotateY(-90deg); box-shadow: -20px 0 40px rgba(0,0,0,0.5); }
    100% { transform: perspective(2000px) rotateY(0deg); box-shadow: 4px 0 20px rgba(0,0,0,0.3); }
  }

  /* ══ Loading ══ */
  .fb-loading {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 20px; z-index: 20;
    background: radial-gradient(ellipse at center, #2a1e14 0%, #120e0a 70%);
  }
  .fb-loading.hidden { display: none; }
  .load-spinner {
    width: 50px; height: 50px;
    border: 2px solid rgba(197,160,89,0.2);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .load-text {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic; font-size: 16px;
    color: rgba(197,160,89,0.6);
    letter-spacing: 1px;
  }
  .load-progress {
    width: 200px; height: 2px;
    background: rgba(197,160,89,0.15);
    border-radius: 1px; overflow: hidden;
  }
  .load-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--gold-dark), var(--gold));
    border-radius: 1px;
    width: 0%;
    transition: width 0.3s ease;
  }

  /* ══ Controles ══ */
  .fb-controls {
    display: flex; align-items: center; justify-content: center;
    gap: 16px; padding: 14px 20px;
    background: rgba(26,20,16,0.95);
    backdrop-filter: blur(20px);
    border-top: 1px solid rgba(197,160,89,0.15);
    flex-shrink: 0;
  }
  .fb-btn {
    width: 44px; height: 44px; border-radius: 50%;
    background: rgba(197,160,89,0.1);
    border: 1px solid rgba(197,160,89,0.25);
    color: var(--gold); font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
  }
  .fb-btn:hover:not(:disabled) { background: var(--gold); color: #1a1410; transform: scale(1.1); box-shadow: 0 4px 16px rgba(197,160,89,0.4); }
  .fb-btn:disabled { opacity: 0.25; cursor: default; }

  .fb-page-info {
    font-family: 'Josefin Sans', sans-serif;
    font-size: 10px; letter-spacing: 3px;
    color: rgba(197,160,89,0.5); text-transform: uppercase;
    min-width: 120px; text-align: center;
  }

  /* Botón pantalla completa */
  .fb-fullscreen {
    width: 36px; height: 36px; border-radius: 8px;
    background: rgba(197,160,89,0.08);
    border: 1px solid rgba(197,160,89,0.2);
    color: rgba(197,160,89,0.5); font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s ease;
  }
  .fb-fullscreen:hover { color: var(--gold); background: rgba(197,160,89,0.15); }

  /* ══ Flechas laterales ══ */
  .fb-arrow-left, .fb-arrow-right {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 48px; height: 48px; border-radius: 50%;
    background: rgba(26,20,16,0.7);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(197,160,89,0.2);
    color: var(--gold); font-size: 22px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 15;
    opacity: 0.6;
  }
  .fb-arrow-left { left: 20px; }
  .fb-arrow-right { right: 20px; }
  .fb-arrow-left:hover, .fb-arrow-right:hover { opacity: 1; background: rgba(197,160,89,0.2); transform: translateY(-50%) scale(1.1); }
  .fb-arrow-left:disabled, .fb-arrow-right:disabled { opacity: 0.15; cursor: default; pointer-events: none; }

  /* ══ Zoom info ══ */
  .zoom-hint {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    font-size: 9px; letter-spacing: 2px; color: rgba(197,160,89,0.3);
    text-transform: uppercase; pointer-events: none;
    font-family: 'Josefin Sans', sans-serif;
  }
</style>
</head>
<body>

<!-- Header -->
<div class="fb-header">
  <button class="fb-back" onclick="window.history.back()" title="Volver">←</button>
  <div class="fb-info">
    <div class="fb-title">Gracia y Coraje</div>
    <div class="fb-author">Ken Wilber</div>
  </div>
  <div class="fb-pages" id="fbPagesInfo">— / —</div>
  <button class="fb-fullscreen" onclick="zoomOut()" title="Alejar">−</button>
<button class="fb-fullscreen" onclick="zoomReset()" title="Zoom normal">⊙</button>
<button class="fb-fullscreen" onclick="zoomIn()" title="Acercar">+</button>
<button class="fb-fullscreen" onclick="toggleFullscreen()" title="Pantalla completa">⛶</button>
</div>

<!-- Área del libro -->
<div class="fb-stage" id="fbStage">

  <!-- Loading -->
  <div class="fb-loading" id="fbLoading">
    <div class="load-spinner"></div>
    <div class="load-text">Cargando libro...</div>
    <div class="load-progress"><div class="load-bar" id="loadBar"></div></div>
  </div>

  <!-- Flechas laterales -->
  <button class="fb-arrow-left" id="arrowLeft" onclick="prevPage()" disabled>‹</button>
  <button class="fb-arrow-right" id="arrowRight" onclick="nextPage()" disabled>›</button>

  <!-- Libro 3D -->
  <div class="book-3d" id="book3d" style="display:none;">
    <div class="book-container" id="bookContainer">
      <div class="page-left" id="pageLeft">
        <canvas id="canvasLeft"></canvas>
      </div>
      <div class="book-spine"></div>
      <div class="page-right" id="pageRight">
        <canvas id="canvasRight"></canvas>
      </div>
    </div>
  </div>

  <div class="zoom-hint">usa las flechas o teclas ← → para navegar</div>
</div>

<!-- Controles -->
<div class="fb-controls">
  <button class="fb-btn" id="btnFirst" onclick="goToPage(1)" disabled title="Primera página">«</button>
  <button class="fb-btn" id="btnPrev" onclick="prevPage()" disabled title="Anterior">‹</button>
  <div class="fb-page-info" id="pageInfo">— / —</div>
  <button class="fb-btn" id="btnNext" onclick="nextPage()" disabled title="Siguiente">›</button>
  <button class="fb-btn" id="btnLast" onclick="goToPage(totalPages)" disabled title="Última página">»</button>
</div>

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  // Leer parámetros de URL
  const params = new URLSearchParams(window.location.search);
  const PDF_URL = params.get('url') || 'https://pub-fc46ecd1c6b8484494c1513716440500.r2.dev/Biblioteca/KEN%20WILBER/Ken-Wilber-Gracia-Y-Coraje-.pdf';
  const TITULO  = params.get('titulo') || 'Gracia y Coraje';
  const AUTOR   = params.get('autor')  || 'Ken Wilber';

  // Actualizar header
  document.querySelector('.fb-title').textContent  = TITULO;
  document.querySelector('.fb-author').textContent = AUTOR;

  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  let pdfDoc = null;
  let totalPages = 0;
  let currentSpread = 1; // número de página izquierda (siempre impar o 0 para portada)
  let pageWidth = 0, pageHeight = 0;
  let isFlipping = false;
  let renderScale = window.innerWidth < 768 ? window.devicePixelRatio * 4 : 1.5;

  const loading   = document.getElementById('fbLoading');
  const book3d    = document.getElementById('book3d');
  const loadBar   = document.getElementById('loadBar');
  const pageInfo  = document.getElementById('pageInfo');
  const pagesInfo = document.getElementById('fbPagesInfo');
  const canvasL   = document.getElementById('canvasLeft');
  const canvasR   = document.getElementById('canvasRight');
  const pageLeft  = document.getElementById('pageLeft');
  const pageRight = document.getElementById('pageRight');
  const bookCont  = document.getElementById('bookContainer');

  /* ══ Calcular tamaño ══ */
 function calcSize() {
  const stage = document.getElementById('fbStage');
  const sw = stage.clientWidth;
  const sh = stage.clientHeight - 40;
  const ratio = pageHeight / pageWidth;
  const isMobile = sw < 768;
  
 if (isMobile) {
    // Una sola página en móvil
    let w = (sw - 40) * zoomLevel;
    let h = w * ratio;
    if (h > sh * zoomLevel) { h = sh * zoomLevel; w = h / ratio; }
    return { w: Math.floor(w), h: Math.floor(h), mobile: true };
  } else {
    // Dos páginas en escritorio
    let w = Math.min((sw - 120) / 2, sh / ratio) * zoomLevel;
    let h = w * ratio;
    if (h > sh) { h = sh; w = h / ratio; }
    return { w: Math.floor(w), h: Math.floor(h), mobile: false };
  }
}

  /* ══ Renderizar página en canvas ══ */
  async function renderPage(pageNum, canvas) {
    if (pageNum < 1 || pageNum > totalPages) {
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#f5f0e8';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      return;
    }
    const page = await pdfDoc.getPage(pageNum);
    const { w, h } = calcSize();
    const vp = page.getViewport({ scale: renderScale });
    const scale = (w * renderScale) / vp.width;
    const viewport = page.getViewport({ scale });
    canvas.width  = viewport.width;
    canvas.height = viewport.height;
    canvas.style.width  = w + 'px';
    canvas.style.height = h + 'px';
    await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
  }

  /* ══ Mostrar spread actual ══ */
 async function renderSpread(spread) {
  const { w, h, mobile } = calcSize();
  
  if (mobile) {
    // Ocultar página izquierda y lomo en móvil
    pageLeft.style.display = 'none';
    document.querySelector('.book-spine').style.display = 'none';
    pageRight.style.width  = w + 'px';
    pageRight.style.height = h + 'px';
    const rightPage = spread === 1 ? 1 : spread;
    await renderPage(rightPage <= totalPages ? rightPage : 0, canvasR);
  } else {
    pageLeft.style.display = 'block';
    document.querySelector('.book-spine').style.display = 'block';
    pageLeft.style.width  = w + 'px';
    pageLeft.style.height = h + 'px';
    pageRight.style.width  = w + 'px';
    pageRight.style.height = h + 'px';
    const leftPage  = spread === 1 ? 0 : spread;
    const rightPage = spread === 1 ? 1 : spread + 1;
    await Promise.all([
      renderPage(leftPage > 0 ? leftPage : 0, canvasL),
      renderPage(rightPage <= totalPages ? rightPage : 0, canvasR)
    ]);
  }
  updateControls();
}

  /* ══ Actualizar controles ══ */
  function updateControls() {
    const left  = currentSpread === 1 ? 0 : currentSpread;
    const right = currentSpread === 1 ? 1 : currentSpread + 1;
    const displayRight = Math.min(right, totalPages);

    pageInfo.textContent  = currentSpread === 1
      ? `Portada / ${totalPages}`
      : `${left} — ${displayRight} / ${totalPages}`;
    pagesInfo.textContent = currentSpread === 1
      ? `Portada`
      : `${left}–${displayRight} / ${totalPages}`;

    document.getElementById('btnPrev').disabled  = currentSpread <= 1;
    document.getElementById('btnFirst').disabled = currentSpread <= 1;
    document.getElementById('arrowLeft').disabled = currentSpread <= 1;

    const atEnd = currentSpread === 1
      ? totalPages <= 1
      : currentSpread + 1 >= totalPages;
    document.getElementById('btnNext').disabled  = atEnd;
    document.getElementById('btnLast').disabled  = atEnd;
    document.getElementById('arrowRight').disabled = atEnd;
  }

  /* ══ Flip animado ══ */
  async function flipTo(newSpread, direction) {
    if (isFlipping) return;
    isFlipping = true;

    const { w, h } = calcSize();
    const stage = document.getElementById('fbStage');
    const bookRect = bookCont.getBoundingClientRect();
    const stageRect = stage.getBoundingClientRect();

    // Crear página de volteo
    const flipPage = document.createElement('div');
    flipPage.className = 'page-flip';
    flipPage.style.cssText = `
      width:${w}px; height:${h}px;
      top:${bookRect.top - stageRect.top}px;
      left:${direction === 'forward'
        ? (bookRect.left - stageRect.left + w + 6) + 'px'
        : (bookRect.left - stageRect.left) + 'px'};
    `;
    if (direction === 'back') {
      flipPage.style.transformOrigin = 'right center';
    }

    const flipCanvas = document.createElement('canvas');
    flipPage.appendChild(flipCanvas);
    stage.appendChild(flipPage);

    // Renderizar página que va a voltear
    const pageToShow = direction === 'forward'
      ? (currentSpread === 1 ? 2 : currentSpread + 2)
      : (newSpread === 1 ? 1 : newSpread + 1);
    await renderPage(pageToShow, flipCanvas);
    flipCanvas.style.width  = w + 'px';
    flipCanvas.style.height = h + 'px';

    // Animar
    flipPage.classList.add(direction === 'forward' ? 'flipping-forward' : 'flipping-back');

    setTimeout(async () => {
      currentSpread = newSpread;
      await renderSpread(currentSpread);
      flipPage.remove();
      isFlipping = false;
    }, 650);
  }

  /* ══ Navegación ══ */
  async function nextPage() {
    if (isFlipping) return;
    const newSpread = currentSpread === 1 ? 2 : currentSpread + 2;
    if (newSpread > totalPages) return;
    await flipTo(newSpread, 'forward');
  }

  async function prevPage() {
    if (isFlipping) return;
    if (currentSpread <= 1) return;
    const newSpread = currentSpread === 2 ? 1 : currentSpread - 2;
    await flipTo(Math.max(1, newSpread), 'back');
  }

  async function goToPage(pageNum) {
    if (isFlipping) return;
    let spread;
    if (pageNum <= 1) { spread = 1; }
    else { spread = pageNum % 2 === 0 ? pageNum : pageNum - 1; }
    if (spread === currentSpread) return;
    currentSpread = spread;
    await renderSpread(currentSpread);
  }

  /* ══ Teclado ══ */
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nextPage();
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   prevPage();
  });

  /* ══ Touch swipe ══ */
  let touchX = 0;
  document.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; });
  document.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchX;
    if (Math.abs(dx) > 50) { dx < 0 ? nextPage() : prevPage(); }
  });

  /* ══ Pantalla completa ══ */
  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen?.();
    } else {
      document.exitFullscreen?.();
    }
  }

  /* ══ Resize ══ */
  window.addEventListener('resize', () => { if (pdfDoc) renderSpread(currentSpread); });

  /* ══ Cargar PDF ══ */
  async function loadPDF() {
    try {
      const loadingTask = pdfjsLib.getDocument({
        url: PDF_URL,
        cMapUrl: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/cmaps/',
        cMapPacked: true,
      });

      loadingTask.onProgress = ({ loaded, total }) => {
        if (total > 0) {
          loadBar.style.width = Math.round((loaded / total) * 100) + '%';
        }
      };

      pdfDoc    = await loadingTask.promise;
      totalPages = pdfDoc.numPages;

      // Obtener tamaño de página
      const firstPage = await pdfDoc.getPage(1);
      const vp = firstPage.getViewport({ scale: 1 });
      pageWidth  = vp.width;
      pageHeight = vp.height;

      // Mostrar libro
      loading.classList.add('hidden');
      book3d.style.display = 'block';

      currentSpread = 1;
      await renderSpread(1);

    } catch (err) {
      console.error('Error cargando PDF:', err);
      document.getElementById('fbLoading').innerHTML = `
        <div style="text-align:center;padding:20px;">
          <div style="font-size:32px;margin-bottom:16px;">📖</div>
          <div style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:16px;color:rgba(197,160,89,0.6);">
            No se pudo cargar el libro.<br>Verifica tu conexión.
          </div>
        </div>`;
    }
  }
 let zoomLevel = 1.0;

function zoomIn() {
  zoomLevel = Math.min(zoomLevel + 0.2, 2.5);
  applyZoom();
}
function zoomOut() {
  zoomLevel = Math.max(zoomLevel - 0.2, 0.5);
  applyZoom();
}
function zoomReset() {
  zoomLevel = 1.0;
  applyZoom();
}
function applyZoom() {
  document.getElementById('book3d').style.transform = `scale(${zoomLevel})`;
  document.getElementById('book3d').style.transformOrigin = 'center center';
  renderScale = window.innerWidth < 768
    ? window.devicePixelRatio * 3 * zoomLevel
    : 1.5 + (zoomLevel - 1) * 4;
  renderSpread(currentSpread);
}
  loadPDF();
  
</script>
