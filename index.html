<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biblioteca Virtual</title>
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100;0,200;0,300;0,400;0,600;0,700;1,300;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<!-- ══ DearFlip CSS ══ -->
<link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/dearflip@2.2.4/dist/dearflip.min.css"/>
<style>
  :root {
    --bg: #F8F5EE;
    --card-bg: #FFFFFF;
    --gold: #C5A059;
    --gold-light: #D4B06A;
    --gold-dark: #A07838;
    --glass: rgba(255,255,255,0.55);
    --glass-border: rgba(255,255,255,0.75);
    --text-dark: #1C1C1E;
    --text-mid: #3A3A3C;
    --text-light: #6C6C70;
    --text-gold: #C5A059;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:antialiased; }
  
  body {
    background: var(--bg);
    font-family: 'Josefin Sans', sans-serif;
    color: var(--text-dark);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ══ Tramado de fondo ══ */
 /* ══ Tramado de fondo ══ */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: url('Fondo/Tramado.png') repeat;
  background-size: 600px 600px;
  opacity: 0.55;
  pointer-events: none;
  z-index: 0;
}

  @keyframes fadeUp   { from{opacity:0;transform:translateY(20px);} to{opacity:1;transform:translateY(0);} }
  @keyframes scaleIn  { from{opacity:0;transform:scale(0.92);} to{opacity:1;transform:scale(1);} }
  @keyframes float    { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-6px);} }
  @keyframes float-up { 0%{transform:translateY(100vh);opacity:0;} 10%{opacity:0.3;} 90%{opacity:0.1;} 100%{transform:translateY(-20px);opacity:0;} }
  @keyframes loto-rotate { from{transform:rotate(0deg);} to{transform:rotate(360deg);} }
  @keyframes pulse-petal  { 0%,100%{filter:brightness(1);} 50%{filter:brightness(1.9) drop-shadow(0 0 5px rgba(197,160,89,0.9));} }
  @keyframes pulse-center { 0%,100%{box-shadow:0 0 8px rgba(197,160,89,0.4);} 50%{box-shadow:0 0 18px rgba(197,160,89,1);} }

  .loto-spinner { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; z-index:3; pointer-events:none; transition:opacity 0.5s ease; }
  .loto-spinner.hidden { opacity:0; }
  .loto-petals { position:relative; width:52px; height:52px; animation:loto-rotate 3.5s linear infinite; }
  .petal { position:absolute; width:14px; height:23px; background:radial-gradient(ellipse at 50% 30%, rgba(197,160,89,0.95), rgba(197,160,89,0.15)); border-radius:50% 50% 50% 50% / 62% 62% 38% 38%; left:50%; top:50%; transform-origin:50% 100%; margin-left:-7px; margin-top:-23px; }
  .petal:nth-child(1){transform:rotate(0deg);   animation:pulse-petal 1.6s ease-in-out infinite 0.00s;}
  .petal:nth-child(2){transform:rotate(45deg);  animation:pulse-petal 1.6s ease-in-out infinite 0.20s;}
  .petal:nth-child(3){transform:rotate(90deg);  animation:pulse-petal 1.6s ease-in-out infinite 0.40s;}
  .petal:nth-child(4){transform:rotate(135deg); animation:pulse-petal 1.6s ease-in-out infinite 0.60s;}
  .petal:nth-child(5){transform:rotate(180deg); animation:pulse-petal 1.6s ease-in-out infinite 0.80s;}
  .petal:nth-child(6){transform:rotate(225deg); animation:pulse-petal 1.6s ease-in-out infinite 1.00s;}
  .petal:nth-child(7){transform:rotate(270deg); animation:pulse-petal 1.6s ease-in-out infinite 1.20s;}
  .petal:nth-child(8){transform:rotate(315deg); animation:pulse-petal 1.6s ease-in-out infinite 1.40s;}
  .loto-center { position:absolute; width:11px; height:11px; background:radial-gradient(circle, var(--gold-light), var(--gold)); border-radius:50%; top:50%; left:50%; transform:translate(-50%,-50%); box-shadow:0 0 10px rgba(197,160,89,0.7); animation:pulse-center 1.6s ease-in-out infinite; }

  #particles { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; overflow:hidden; }
  .particle { position:absolute; border-radius:50%; opacity:0; animation:float-up linear infinite; background:var(--gold); }

  #panelMusica { display:none !important; }
  #panelMusicaMobile { position:fixed; bottom:24px; right:24px; display:flex; flex-direction:column; align-items:flex-end; gap:12px; z-index:500; }
  #inicioMusicaM { width:54px; height:54px; border-radius:50%; background:var(--glass); backdrop-filter:blur(20px) saturate(1.8); -webkit-backdrop-filter:blur(20px) saturate(1.8); border:1.5px solid var(--glass-border); color:var(--gold); font-size:20px; display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 8px 32px rgba(0,0,0,0.12), inset 0 1px 0 rgba(255,255,255,0.8); transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s; }
  #inicioMusicaM:hover { transform:scale(1.12); }
  .player-widget { display:none; flex-direction:column; align-items:center; gap:8px; width:100%; }
  .player-progress { width:100%; height:3px; background:rgba(197,160,89,0.2); border-radius:2px; cursor:pointer; }
  .player-progress-bar { height:100%; background:linear-gradient(90deg,var(--gold),var(--gold-light)); border-radius:2px; width:0%; transition:width 0.5s linear; }
  .player-controls { display:flex; align-items:center; gap:12px; }
  .player-btn { background:none; border:none; color:rgba(197,160,89,0.5); font-size:14px; cursor:pointer; transition:all 0.2s; }
  .player-btn:hover { color:var(--gold); transform:scale(1.15); }
  .player-btn.disabled { opacity:0.2; cursor:default; pointer-events:none; }
  .player-btn.play-btn { width:34px; height:34px; border-radius:50%; background:var(--gold); color:white; font-size:13px; display:flex; align-items:center; justify-content:center; }
  .mobile-vol-row { display:none; align-items:center; gap:8px; width:100%; justify-content:center; }
  .mobile-vol-row span { font-size:13px; }
  #volumenM { width:100px; accent-color:var(--gold); cursor:pointer; height:3px; }
  .player-widget#playerWidgetM { background:var(--glass); backdrop-filter:blur(20px) saturate(1.8); -webkit-backdrop-filter:blur(20px) saturate(1.8); border:1.5px solid var(--glass-border); border-radius:18px; padding:14px 16px; box-shadow:0 8px 32px rgba(0,0,0,0.1), inset 0 1px 0 rgba(255,255,255,0.8); min-width:190px; }

  .app { position:relative; z-index:1; display:flex; min-height:100vh; }
  .panel-cats { width:100%; flex-shrink:0; display:flex; flex-direction:column; align-items:center; min-height:100vh; transition:transform 0.55s cubic-bezier(0.77,0,0.18,1), opacity 0.4s ease; will-change:transform,opacity; }
  .panel-cats.slide-out { transform:translateX(-100%); opacity:0; pointer-events:none; position:absolute; top:0; left:0; width:100%; }

  .app-header { width:100%; display:flex; flex-direction:column; align-items:center; padding:48px 28px 32px; background:rgba(255,255,255,0.85); backdrop-filter:blur(20px); border-bottom:1px solid rgba(197,160,89,0.18); box-shadow:0 2px 20px rgba(0,0,0,0.04); animation:fadeUp 0.7s cubic-bezier(0.34,1.56,0.64,1) both; position:relative; }
  .app-logo { width:150px; height:150px; border-radius:50%; object-fit:cover; border:1px solid rgba(197,160,89,0.25); box-shadow:0 4px 24px rgba(0,0,0,0.08); margin-bottom:20px; cursor:pointer; transition:transform 0.5s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.4s ease; animation:float 6s ease-in-out infinite; }
  .app-logo:hover { transform:scale(1.05); box-shadow:0 8px 32px rgba(0,0,0,0.12), 0 0 0 1px rgba(197,160,89,0.3); animation:none; }
  .app-title { font-family:'Josefin Sans', sans-serif; font-size:11px; letter-spacing:6px; color:var(--text-gold); text-transform:uppercase; line-height:2.2; text-align:center; font-weight:700; }
  .app-quote { font-family:'Cormorant Garamond', serif; font-style:italic; font-size:13px; color:var(--text-light); margin-top:10px; text-align:center; line-height:1.6; }
  .gold-divider { width:50%; height:1px; background:linear-gradient(90deg, transparent, rgba(197,160,89,0.4), transparent); margin:8px 0; }

  .search-box-wrap { width:100%; margin-top:16px; }
  .search-box { width:100%; display:flex; align-items:center; gap:10px; background:var(--bg); border:1px solid rgba(197,160,89,0.2); border-radius:10px; padding:10px 14px; box-shadow:inset 0 1px 3px rgba(0,0,0,0.04); transition:all 0.3s ease; }
  .search-box:focus-within { border-color:rgba(197,160,89,0.5); box-shadow:0 0 0 3px rgba(197,160,89,0.08), inset 0 1px 3px rgba(0,0,0,0.04); background:#FFFFFF; }
  .search-box input { flex:1; background:none; border:none; outline:none; color:var(--text-dark); font-family:'Josefin Sans', sans-serif; font-size:12px; letter-spacing:0.3px; }
  .search-box input::placeholder { color:rgba(100,80,40,0.35); font-style:italic; }
  .search-box-icon { font-size:13px; color:rgba(197,160,89,0.6); flex-shrink:0; }
  .search-box-clear { background:none; border:none; color:rgba(100,80,40,0.35); font-size:13px; cursor:pointer; padding:2px; transition:all 0.2s; display:none; }
  .search-box-clear.visible { display:block; }
  .search-box-clear:hover { color:var(--gold); }

  .hero-bar { background:#1C1C1E; border-radius:12px; padding:20px 24px; margin-bottom:28px; position:relative; overflow:hidden; cursor:default; }
  .hero-bar::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg, rgba(197,160,89,0.06) 0%, transparent 50%); pointer-events:none; }
  .hero-bar::after { content:''; position:absolute; bottom:0; left:0; right:0; height:1px; background:linear-gradient(90deg, transparent, rgba(197,160,89,0.4), transparent); }
  .hero-ornament { font-size:9px; letter-spacing:0.3em; color:rgba(197,160,89,0.6); text-transform:uppercase; margin-bottom:8px; position:relative; z-index:1; transition:transform 0.15s ease; }
  .hero-title { font-size:14px; font-weight:700; letter-spacing:0.2em; color:rgba(197,160,89,0.75); text-transform:uppercase; position:relative; z-index:1; transition:transform 0.15s ease; }
  .hero-sub { font-family:'Cormorant Garamond', serif; font-style:italic; font-size:13px; color:#FFFFFF; margin-top:6px; position:relative; z-index:1; transition:transform 0.15s ease; line-height:1.5; }

  .cats-label { font-family:'Josefin Sans', sans-serif; font-size:9px; letter-spacing:5px; color:var(--text-gold); text-transform:uppercase; width:100%; padding:28px 28px 16px; animation:fadeUp 0.7s ease 0.2s both; display:flex; align-items:center; gap:14px; font-weight:700; }
  .cats-label::after { content:''; flex:1; height:1px; background:linear-gradient(90deg, rgba(197,160,89,0.4), transparent); border-radius:1px; }

  .cats-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:0 20px 32px; width:100%; animation:fadeUp 0.7s ease 0.3s both; }
  .cats-grid-wrap.hidden { display:none; }

  .cat-card { background:#FFFFFF; border:none; border-radius:12px; padding:12px 14px 12px; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:10px; position:relative; overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,0.05), 0 4px 16px rgba(0,0,0,0.04); transition:all 0.35s cubic-bezier(0.34,1.2,0.64,1); animation:scaleIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both; }
  .cat-card::before { content:''; position:absolute; bottom:0; left:20%; right:20%; height:2px; background:linear-gradient(90deg, transparent, rgba(197,160,89,0.5), transparent); opacity:0; transition:opacity 0.3s; border-radius:1px; }
  .cat-card:hover { transform:translateY(-5px); box-shadow:0 2px 6px rgba(0,0,0,0.04), 0 12px 32px rgba(0,0,0,0.09), 0 0 0 1px rgba(197,160,89,0.12); }
  .cat-card:hover::before { opacity:1; }
  .cat-card:active { transform:scale(0.97); }
  .cat-icon { width:80px; height:80px; display:block; flex-shrink:0; transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s ease; }
  .cat-icon svg { width:100%; height:100%; stroke:var(--gold); fill:none; stroke-width:1.5; stroke-linecap:round; stroke-linejoin:round; transition:stroke 0.4s ease, transform 0.4s cubic-bezier(0.34,1.56,0.64,1); }
  .cat-card:hover .cat-icon { transform:translateY(-3px) scale(1.15); }
  .cat-card:hover .cat-icon svg { stroke:var(--gold-dark); }
  .cat-name { font-family:'Josefin Sans', sans-serif; font-size:9px; letter-spacing:1.5px; color:var(--text-mid); text-transform:uppercase; text-align:center; line-height:1.7; font-weight:600; transition:color 0.3s ease; }
  .cat-card:hover .cat-name { color:var(--text-dark); }

  .panel-books { position:fixed; inset:0; display:flex; flex-direction:column; background:transparent; z-index:10; transform:translateX(100%); opacity:0; transition:transform 0.55s cubic-bezier(0.77,0,0.18,1), opacity 0.4s ease; will-change:transform,opacity; overflow-y:auto; padding-bottom:80px; }
  .panel-books.slide-in { transform:translateX(0); opacity:1; }
  .books-loto { position:fixed; inset:0; background-image:url('Fondo/Tramado.png'); background-size:cover; background-position:center; opacity:0.05; pointer-events:none; z-index:0; }

  .books-header { position:sticky; top:0; z-index:5; display:flex; align-items:center; gap:12px; padding:14px 20px; background:rgba(255,252,247,0.92); backdrop-filter:blur(28px) saturate(1.8); -webkit-backdrop-filter:blur(28px) saturate(1.8); border-bottom:1px solid rgba(197,160,89,0.35); box-shadow:0 1px 0 rgba(255,255,255,0.9) inset, 0 4px 20px rgba(0,0,0,0.07); flex-wrap:nowrap; }
  .back-logo { width:80px; height:80px; border-radius:50%; object-fit:cover; border:1.5px solid rgba(255,255,255,0.8); box-shadow:0 0 0 1px rgba(197,160,89,0.25), 0 4px 16px rgba(0,0,0,0.1); cursor:pointer; flex-shrink:0; transition:transform 0.5s cubic-bezier(0.34,1.56,0.64,1); }
  .back-logo:hover { transform:scale(1.08) rotate(-3deg); }
  .books-header-info { flex:1; }
  .books-cat-name { font-family:'Josefin Sans', sans-serif; font-size:10px; letter-spacing:4px; color:var(--text-gold); text-transform:uppercase; font-weight:700; }
  .books-count { font-size:12px; color:var(--text-light); margin-top:3px; font-style:italic; font-family:'Cormorant Garamond', serif; }
  .back-btn { padding:9px 20px; background:rgba(255,255,255,0.7); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); border:1px solid rgba(197,160,89,0.3); border-radius:50px; color:var(--text-gold); font-family:'Josefin Sans', sans-serif; font-size:9px; letter-spacing:2px; cursor:pointer; font-weight:700; box-shadow:0 2px 12px rgba(0,0,0,0.05); transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1); white-space:nowrap; }
  .back-btn:hover { background:var(--gold); color:white; border-color:var(--gold); transform:translateY(-2px) scale(1.04); box-shadow:0 6px 20px rgba(197,160,89,0.4); }

  .books-inner { position:relative; z-index:1; display:grid; grid-template-columns:repeat(2,1fr); gap:18px; padding:28px 24px; }
  @media(min-width:500px) { .books-inner { grid-template-columns:repeat(3,1fr); } }
  @media(min-width:768px) { .books-inner { grid-template-columns:repeat(4,1fr); max-width:960px; padding:32px; gap:22px; } }
  @media(min-width:1100px) { .books-inner { grid-template-columns:repeat(5,1fr); max-width:1200px; } }

  .book-card { background:#FFFFFF; border:none; border-radius:14px; overflow:hidden; cursor:pointer; transition:all 0.45s cubic-bezier(0.34,1.56,0.64,1); animation:scaleIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both; max-width:280px; width:100%; display:flex; flex-direction:column; box-shadow:0 2px 8px rgba(0,0,0,0.06), 0 4px 20px rgba(0,0,0,0.04); }
  .book-card:hover { transform:translateY(-10px) scale(1.02); box-shadow:0 20px 50px rgba(0,0,0,0.12), 0 8px 20px rgba(0,0,0,0.08), 0 0 0 1px rgba(197,160,89,0.2); }
  .book-cover-wrap { width:100%; padding-top:115%; position:relative; overflow:hidden; background:linear-gradient(135deg,#ede8e0,#ddd5c8); border-bottom:1px solid rgba(197,160,89,0.1); }
  .book-cover-wrap img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; transition:transform 0.6s ease, opacity 0.8s ease; opacity:0; }
  .book-cover-wrap img.img-loaded { opacity:1; }
  .book-card:hover .book-cover-wrap img { transform:scale(1.06); }
  .book-info { padding:14px 14px 14px; display:flex; flex-direction:column; flex:1; }
  .book-title { font-family:'Josefin Sans', sans-serif; font-weight:700; font-size:11px; color:var(--text-dark); line-height:1.5; margin-bottom:4px; letter-spacing:0.3px; }
  .book-author { font-size:11px; color:var(--text-light); font-style:italic; margin-bottom:auto; padding-bottom:12px; font-family:'Cormorant Garamond', serif; }
  .book-btn { display:block; width:100%; padding:8px 14px; background:var(--bg); color:var(--gold-dark); border:1px solid rgba(197,160,89,0.3); border-radius:50px; cursor:pointer; font-family:'Josefin Sans', sans-serif; font-size:8px; letter-spacing:1.5px; text-transform:uppercase; transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1); text-decoration:none; text-align:center; font-weight:700; }
  .book-btn:hover { background:var(--gold); color:white; border-color:transparent; transform:translateY(-1px); box-shadow:0 6px 20px rgba(197,160,89,0.4); }

  .search-results { display:none; animation:fadeUp 0.35s ease both; }
  .search-results.visible { display:block; }
  .sr-meta { display:flex; align-items:baseline; gap:10px; margin-bottom:18px; padding-bottom:12px; border-bottom:1px solid rgba(197,160,89,0.2); }
  .sr-count { font-family:'Josefin Sans', sans-serif; font-size:9px; letter-spacing:3px; color:var(--text-light); text-transform:uppercase; font-weight:700; }
  .sr-query { font-style:italic; font-size:14px; color:var(--gold); font-family:'Cormorant Garamond', serif; }
  .sr-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(140px,1fr)); gap:14px; }
  .sr-card { background:#FFFFFF; border:none; border-radius:12px; overflow:hidden; cursor:pointer; transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1); animation:scaleIn 0.4s ease both; display:flex; flex-direction:column; box-shadow:0 2px 8px rgba(0,0,0,0.05), 0 4px 16px rgba(0,0,0,0.04); }
  .sr-card:hover { transform:translateY(-5px) scale(1.02); box-shadow:0 12px 32px rgba(0,0,0,0.1); }
  .sr-cover { width:100%; padding-top:120%; position:relative; background:linear-gradient(135deg,#ede8e0,#ddd5c8); overflow:hidden; }
  .sr-cover img { position:absolute; inset:0; width:100%; height:100%; object-fit:contain; background:#f5f0e8; opacity:0; transition:opacity 0.6s ease; }
  .sr-cover img.loaded { opacity:1; }
  .sr-cover-fallback { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; padding:10px; }
  .sr-cover-fallback .sr-icon { width:32px; height:32px; opacity:0.5; }
  .sr-cover-fallback .sr-icon svg { width:100%; height:100%; stroke:var(--gold); fill:none; stroke-width:1.5; stroke-linecap:round; stroke-linejoin:round; }
  .sr-cover-fallback small { font-family:'Josefin Sans', sans-serif; font-size:6px; letter-spacing:1px; color:rgba(100,80,40,0.4); text-transform:uppercase; text-align:center; font-weight:700; }
  .sr-info { padding:10px 11px; flex:1; display:flex; flex-direction:column; gap:3px; }
  .sr-title { font-family:'Josefin Sans', sans-serif; font-weight:700; font-size:11px; color:var(--text-dark); line-height:1.4; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .sr-title mark { background:none; color:var(--gold); font-weight:700; }
  .sr-author { font-size:10px; color:var(--text-light); font-style:italic; font-family:'Cormorant Garamond', serif; }
  .sr-tag { margin-top:auto; padding-top:6px; font-family:'Josefin Sans', sans-serif; font-size:7px; letter-spacing:1px; color:rgba(100,80,40,0.3); text-transform:uppercase; font-weight:700; }
  .sr-btn { display:block; width:100%; padding:6px; background:rgba(197,160,89,0.08); color:var(--gold-dark); border:1px solid rgba(197,160,89,0.2); border-radius:0 0 12px 12px; cursor:pointer; font-family:'Josefin Sans', sans-serif; font-size:7px; letter-spacing:1.5px; text-transform:uppercase; transition:all 0.3s ease; text-decoration:none; text-align:center; font-weight:700; }
  .sr-btn:hover { background:var(--gold); color:white; border-color:transparent; }
  .sr-empty,.empty-msg { grid-column:1/-1; text-align:center; padding:60px 20px; font-family:'Cormorant Garamond', serif; font-style:italic; font-size:18px; color:var(--text-light); line-height:1.8; }

  @media(min-width:600px) { .cats-grid { grid-template-columns:1fr 1fr 1fr; max-width:700px; margin:0 auto; padding:0 28px 28px; } .app-header { padding:54px 40px 38px; } .sr-grid { grid-template-columns:repeat(auto-fill, minmax(150px,1fr)); } }
  @media(min-width:900px) {
    .panel-cats { flex-direction:row; align-items:flex-start; }
    .app-header { width:260px; min-width:260px; flex-shrink:0; min-height:100vh; padding:54px 24px 100px; border-bottom:none; border-right:1px solid rgba(197,160,89,0.18); position:sticky; top:0; height:100vh; justify-content:center; display:flex; flex-direction:column; align-items:center; }

  .view-toggle { display:flex; align-items:center; gap:5px; background:rgba(255,255,255,0.7); border:1px solid rgba(197,160,89,0.2); border-radius:50px; padding:4px 5px; box-shadow:0 2px 8px rgba(0,0,0,0.05); flex-shrink:0; }

<script>

    'Nikola Tesla': `<svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>`,

    'Biología y comportamiento social': `<svg viewBox="0 0 24 24"><circle cx="9" cy="7" r="3"/><circle cx="15" cy="7" r="3"/><path d="M3 21v-1a6 6 0 0 1 6-6h6a6 6 0 0 1 6 6v1"/></svg>`,
    'Inteligencia Artificial en lo Humano': `<svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="3"/><path d="M12 8v3M8 14h.01M12 14h.01M16 14h.01"/></svg>`,
    'Herramientas Prácticas para Sostener los Cambios': `<svg viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>`,
    'Papa León XIV': `<svg viewBox="0 0 24 24"><path d="M12 2l1.5 4.5h4.5l-3.5 2.5 1.5 4.5L12 11l-4 2.5 1.5-4.5L6 6.5h4.5z"/><path d="M12 15v7M8 22h8"/></svg>`,
  };

  const catData = [
    {name:'Barbara Ann Brenan'},{name:'Biodescodificación'},{name:'Budismo'},
    {name:'Carolyne Myss'},{name:'Constelaciones Familiares'},{name:'Cristaloterapia'},
    {name:'Filosofía y Religión'},{name:'Geometría Sagrada'},{name:'Kabbalah'},
    {name:'Ken Wilber'},{name:'Kryon'},{name:'Libros Raros'},{name:'Lobsang Rampa'},
    {name:'Neville Goddard'},{name:'Nikola Tesla'},{name:'Teosofía'},{name:'Triguerinho'},
    {name:'Biología y comportamiento social'},{name:'Inteligencia Artificial en lo Humano'},
    {name:'Herramientas Prácticas para Sostener los Cambios'},{name:'Papa León XIV'},
  ];

  const catIconsEmoji = {'Ken Wilber':'🌊','Barbara Ann Brenan':'🌺','Biodescodificación':'🧬','Budismo':'🌿','Carolyne Myss':'🌸','Constelaciones Familiares':'🫧','Cristaloterapia':'💎','Filosofía y Religión':'🕊️','Geometría Sagrada':'🌀','Kabbalah':'🔮','Kryon':'✨','Libros Raros':'📜','Lobsang Rampa':'🏔️','Neville Goddard':'🌙','Nikola Tesla':'⚡','Teosofía':'🌌','Triguerinho':'🌟','Biología y comportamiento social':'🧬👥','Inteligencia Artificial en lo Humano':'🤖','Herramientas Prácticas para Sostener los Cambios':'🧰','Papa León XIV':'📜'};

  function buildCatsGrid() {
    const grid = document.getElementById('catsGrid');
    grid.innerHTML = catData.map((c, i) => {
      const svg = catSVGs[c.name] || `<svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>`;
      const icon = catIconsEmoji[c.name] || '📖';
      return `<div class="cat-card" onclick="abrirCategoria('${c.name.replace(/'/g,"\\'")}','${icon}')" style="animation-delay:${0.05+i*0.03}s">
        <span class="cat-icon">${svg}</span>
        <span class="cat-name">${c.name}</span>
      </div>`;
    }).join('');
    initTilt();
  }

  const heroBar = document.getElementById('heroBar');
  const hOrn = document.getElementById('hOrnament');
  const hTit = document.getElementById('hTitle');
  const hSub = document.getElementById('hSub');
  if (heroBar) {
    heroBar.addEventListener('mousemove', e => {
      const r=heroBar.getBoundingClientRect(), x=(e.clientX-r.left)/r.width-0.5, y=(e.clientY-r.top)/r.height-0.5;
      heroBar.style.backgroundPosition=`${50+x*15}% ${50+y*15}%`;
      hOrn.style.transform=`translateX(${x*10}px)`;
      hTit.style.transform=`translateX(${x*7}px) translateY(${y*3}px)`;
      hSub.style.transform=`translateX(${x*5}px)`;
    });
    heroBar.addEventListener('mouseleave', () => { heroBar.style.backgroundPosition='50% 50%'; hOrn.style.transform=hTit.style.transform=hSub.style.transform=''; });
  }

  let dfInstance = null;
  function esPDF(url) { return url && url.toLowerCase().includes('.pdf'); }

  function abrirVisor(url, titulo, autor) {
    if (esPDF(url)) {
      const params = new URLSearchParams({ url, titulo: titulo || '', autor: autor || '' });
      window.location.href = 'flipbook.html?' + params.toString();
    } else {
      document.getElementById('visorTitulo').textContent = titulo || 'Libro';
      document.getElementById('visorAutor').textContent  = autor  || '';
      document.getElementById('visorEstado').classList.remove('oculto');
      document.getElementById('visorOverlay').classList.add('visible');
      document.getElementById('visorPanel').classList.add('open');
      document.body.style.overflow = 'hidden';
      const iframe = document.getElementById('visorIframe');
      document.getElementById('df-flipbook-container').classList.remove('activo');
      iframe.classList.remove('activo');
      iframe.src = 'about:blank';
      iframe.classList.add('activo');
      iframe.onload = function() { if (iframe.src !== 'about:blank') document.getElementById('visorEstado').classList.add('oculto'); };
      setTimeout(() => { iframe.src = url; }, 300);
    }
  }

  function cerrarVisor() {
    document.getElementById('visorOverlay').classList.remove('visible');
    document.getElementById('visorPanel').classList.remove('open');
    document.body.style.overflow = '';
    setTimeout(() => {
      if (dfInstance) { try { dfInstance.dispose(); } catch(e){} dfInstance = null; }
      const dfContainer = document.getElementById('df-flipbook-container');
      dfContainer.classList.remove('activo'); dfContainer.innerHTML = '';
      document.getElementById('visorIframe').classList.remove('activo');
      document.getElementById('visorIframe').src = 'about:blank';
      document.getElementById('visorEstado').classList.remove('oculto');
    }, 500);
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && document.getElementById('visorPanel').classList.contains('open')) cerrarVisor();
  });

  function bookCardHTML(l,i) {
    const tieneImagen=l.imagen&&l.imagen.trim();
    const esAudio=l.subcategoria&&l.subcategoria.includes('Audio');
    const tituloEsc=(l.titulo||'').replace(/'/g,"\\'").replace(/"/g,'&quot;');
    const autorEsc=(l.autor||'').replace(/'/g,"\\'");
    const btnHtml=`
      ${l.url?(esAudio?`<button class="book-btn" onclick="abrirVisor('${l.url}','${tituloEsc}','${autorEsc}')">🎧 Escuchar</button>`:`<button class="book-btn" onclick="abrirVisor('${l.url}','${tituloEsc}','${autorEsc}')">📖 Abrir libro</button>`):''}
      ${l.video?`<button class="book-btn" style="margin-top:6px;" onclick="abrirVisor('${l.video}','${tituloEsc}','${autorEsc}')">▶ Ver video</button>`:''}`;
    return `<div class="book-card" style="animation-delay:${i*0.06}s">
      <div class="book-cover-wrap">
        <div class="loto-spinner"><div class="loto-petals"><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="loto-center"></div></div></div>
        ${tieneImagen?`<img src="${l.imagen}" alt="${l.titulo}" style="${l.imgPosition?'object-position:'+l.imgPosition+';':''}${l.imgContain?'object-fit:contain;background:#f5f0e8;':''}" onload="revelarPortada(this)" onerror="this.style.display='none';ocultarLoto(this.parentElement.querySelector('.loto-spinner'));">`:`<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:10px;"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="rgba(197,160,89,0.4)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg><span style="font-family:'Josefin Sans',sans-serif;font-size:7px;letter-spacing:2px;color:rgba(100,80,40,0.35);text-transform:uppercase;font-weight:700;">Próximamente</span></div>`}
      </div>
      <div class="book-info">
        <div class="book-title">${l.titulo}</div>
        <div class="book-author">${l.autor}</div>
        ${btnHtml}
      </div>
    </div>`;
  }

  const panelCats=document.getElementById('panelCats');
  const panelBooks=document.getElementById('panelBooks');
  let navState='home', currentCat=null, currentCatIcon=null;
  history.replaceState({nav:'home'},'');

  window.addEventListener('popstate',function(e){
    const state=e.state||{};
    if(state.nav==='category'){
      const subcats=[...new Set(libros.filter(l=>l.categoria===state.cat&&l.subcategoria).map(l=>l.subcategoria))];
      if(subcats.length>0){_mostrarCategoria(state.cat,state.icon);navState='category';}
      else{const filtrados=libros.filter(l=>l.categoria===state.cat&&!l.subcategoria);document.getElementById('booksCatName').textContent=state.icon+'  '+state.cat;document.getElementById('booksCount').textContent=filtrados.length+(filtrados.length===1?' libro':' libros');mostrarLibros(filtrados);navState='category';}
    } else {_irAInicio();}
  });

  function _irAInicio(){
    navState='home';
    document.getElementById('panelMusicaMobile').style.opacity='1';
    document.getElementById('panelMusicaMobile').style.pointerEvents='auto';
    panelBooks.classList.remove('slide-in');
    panelCats.classList.remove('slide-out');
    window.scrollTo(0,0);
  }

  function _mostrarCategoria(cat,icon){
    const subcats=[...new Set(libros.filter(l=>l.categoria===cat&&l.subcategoria).map(l=>l.subcategoria))];
    const subcatImages={'Audios de Neville Goddard':'Libros/Neville_goddard/Audios/audiosneville.jpg','Libros de Neville Goddard':'Libros/Neville_goddard/Libros/librosneville.jpg'};
    const subcatIcons={'Audios de Neville Goddard':'🎧','Libros de Neville Goddard':'📚'};
    document.getElementById('booksCatName').textContent=icon+'  '+cat;
    document.getElementById('booksCount').textContent=subcats.length+' colecciones';
    const grid=document.getElementById('booksInner');
    grid.innerHTML=subcats.map((sub,i)=>{
      const subLibros=libros.filter(l=>l.subcategoria===sub);
      const primerImg=subcatImages[sub]||subLibros[0]?.imagen||'';
      const subIcon=subcatIcons[sub]||'📁';
      return `<div class="book-card" style="animation-delay:${i*0.1}s;cursor:pointer;" onclick="abrirSubcategoria('${cat}','${sub}','${icon}','${subIcon}')">
        <div class="book-cover-wrap">
          <div class="loto-spinner"><div class="loto-petals"><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="loto-center"></div></div></div>
          ${primerImg?`<img src="${primerImg}" alt="${sub}" style="object-fit:contain;background:#f5f0e8;" onload="this.classList.add('img-loaded');const s=this.parentElement.querySelector('.loto-spinner');if(s)s.classList.add('hidden');" onerror="this.style.display='none';const s=this.parentElement.querySelector('.loto-spinner');if(s)s.classList.add('hidden');">`:`<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0.4;"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#C5A059" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></div>`}
        </div>
        <div class="book-info"><div class="book-title">${subIcon} ${sub}</div><div class="book-author">${subLibros.length} ${subLibros.length===1?'elemento':'elementos'}</div></div>
      </div>`;
    }).join('');
    navState='category'; panelBooks.scrollTop=0;
  }

  function abrirCategoria(cat,icon){
    currentCat=cat; currentCatIcon=icon;
    document.getElementById('panelMusicaMobile').style.transition='opacity 0.5s ease';
    document.getElementById('panelMusicaMobile').style.opacity='0';
    setTimeout(()=>{document.getElementById('panelMusicaMobile').style.pointerEvents='none';},500);
    const subcats=[...new Set(libros.filter(l=>l.categoria===cat&&l.subcategoria).map(l=>l.subcategoria))];
    const sinSubcat=libros.filter(l=>l.categoria===cat&&!l.subcategoria);
    if(subcats.length>0){_mostrarCategoria(cat,icon);history.pushState({nav:'category',cat,icon},'');navState='category';}
    else{
      const filtrados=sinSubcat.length>0?sinSubcat:libros.filter(l=>l.categoria===cat);
      document.getElementById('booksCatName').textContent=icon+'  '+cat;
      document.getElementById('booksCount').textContent=filtrados.length>0?filtrados.length+(filtrados.length===1?' libro':' libros'):'Próximamente';
      mostrarLibros(filtrados);history.pushState({nav:'category',cat,icon},'');navState='category';
    }
    panelCats.classList.add('slide-out');
    panelBooks.classList.add('slide-in');
    panelBooks.scrollTop=0;
  }

  function abrirSubcategoria(cat,sub,catIcon,subIcon){
    const filtrados=libros.filter(l=>l.subcategoria===sub);
    document.getElementById('booksCatName').textContent=subIcon+'  '+sub;
    document.getElementById('booksCount').textContent=filtrados.length+(filtrados.length===1?' elemento':' elementos');
    mostrarLibros(filtrados);history.pushState({nav:'subcategory',cat,sub,catIcon,subIcon},'');navState='subcategory';panelBooks.scrollTop=0;
  }

  function mostrarLibros(filtrados){
    const grid=document.getElementById('booksInner');
    grid.innerHTML=filtrados.length===0?`<div class="empty-msg">Próximamente libros<br>en esta colección ✦</div>`:filtrados.map((l,i)=>bookCardHTML(l,i)).join('');
    requestAnimationFrame(()=>{const now=Date.now();grid.querySelectorAll('.loto-spinner').forEach(s=>{s._startTime=now;});});
    cfInit(filtrados);
  }

  function volverInicio(){ history.pushState({nav:'home'},'');_irAInicio(); }

  const LOTO_MIN=1200;
  function revelarPortada(img){const s=img.parentElement.querySelector('.loto-spinner');if(!s)return;const r=Math.max(0,LOTO_MIN-(Date.now()-(s._startTime||Date.now())));setTimeout(()=>{img.classList.add('img-loaded');s.classList.add('hidden');},r);}
  function ocultarLoto(s){if(!s)return;const r=Math.max(0,LOTO_MIN-(Date.now()-(s._startTime||Date.now())));setTimeout(()=>s.classList.add('hidden'),r);}

  function highlight(t,q){return t.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi'),'<mark>$1</mark>');}

  function buscarLibros(){
    const q=document.getElementById('searchInput').value.trim();
    const results=document.getElementById('searchResults'),catsWrap=document.getElementById('catsGridWrap'),clearBtn=document.getElementById('searchClear');
    clearBtn.classList.toggle('visible',q.length>0);
    if(!q){results.classList.remove('visible');catsWrap.classList.remove('hidden');return;}
    catsWrap.classList.add('hidden');results.classList.add('visible');
    const encontrados=libros.filter(l=>l.titulo.toLowerCase().includes(q.toLowerCase())||l.autor.toLowerCase().includes(q.toLowerCase())||l.categoria.toLowerCase().includes(q.toLowerCase()));
    document.getElementById('srCount').textContent=encontrados.length+(encontrados.length===1?' resultado':' resultados');
    document.getElementById('srQuery').textContent=`"${q}"`;
    const grid=document.getElementById('srGrid');
    if(!encontrados.length){grid.innerHTML=`<div class="sr-empty">No se encontró "<em>${q}</em>" ✦</div>`;return;}
    grid.innerHTML=encontrados.map((l,i)=>{
      const svg=catSVGs[l.categoria]||`<svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>`;
      const tieneImg=l.imagen&&l.imagen.trim(),esAudio=l.subcategoria&&l.subcategoria.includes('Audio');
      const tit=(l.titulo||'').replace(/'/g,"\\'"),aut=(l.autor||'').replace(/'/g,"\\'");
      return `<div class="sr-card" style="animation-delay:${i*0.04}s">
        <div class="sr-cover">${tieneImg?`<img src="${l.imagen}" alt="${l.titulo}" style="${l.imgContain?'object-fit:contain;':''}${l.imgPosition?'object-position:'+l.imgPosition+';':''}" onload="this.classList.add('loaded')" onerror="this.style.display='none'">`:''}<div class="sr-cover-fallback" ${tieneImg?'style="opacity:0.35"':''}><div class="sr-icon">${svg}</div><small>${l.titulo}</small></div></div>
        <div class="sr-info"><div class="sr-title">${highlight(l.titulo,q)}</div><div class="sr-author">${l.autor}</div><div class="sr-tag">${l.categoria}</div></div>
        ${l.url?(esAudio?`<button class="sr-btn" onclick="abrirVisor('${l.url}','${tit}','${aut}')">🎧 Escuchar</button>`:`<button class="sr-btn" onclick="abrirVisor('${l.url}','${tit}','${aut}')">📖 Abrir libro</button>`):`<span class="sr-btn" style="opacity:0.35;cursor:default;">Próximamente</span>`}
      </div>`;
    }).join('');
    if(window.innerWidth<=768) setTimeout(()=>results.scrollIntoView({behavior:'smooth',block:'start'}),100);
  }

  function limpiarBusqueda(){document.getElementById('searchInput').value='';buscarLibros();document.getElementById('searchInput').focus();}
  document.getElementById('searchInput').addEventListener('focus',function(){if(window.innerWidth<=768) setTimeout(()=>this.scrollIntoView({behavior:'smooth',block:'center'}),350);});

  const cont=document.getElementById('particles');
  for(let i=0;i<18;i++){const p=document.createElement('div');p.className='particle';p.style.cssText=`left:${Math.random()*100}%;animation-duration:${12+Math.random()*20}s;animation-delay:${Math.random()*14}s;width:${1+Math.random()*1.5}px;height:${1+Math.random()*1.5}px;opacity:0.4;`;cont.appendChild(p);}

  const audio=document.getElementById('musicaFondo');audio.volume=0.5;let isRepeating=true;
  function iniciarMusica(){audio.play();document.getElementById('inicioMusicaM').style.display='none';document.getElementById('playerWidgetM').style.display='flex';document.getElementById('mobileVolRow').style.display='flex';}
  function toggleAudio(){if(audio.paused){audio.play();document.getElementById('playPauseBtnM').textContent='⏸';}else{audio.pause();document.getElementById('playPauseBtnM').textContent='▶';}}
  function toggleRepeat(){isRepeating=!isRepeating;audio.loop=isRepeating;document.getElementById('repeatBtnM').style.color=isRepeating?'var(--gold)':'rgba(197,160,89,0.3)';}
  function seekAudio(e){audio.currentTime=(e.offsetX/e.currentTarget.offsetWidth)*audio.duration;}
  audio.addEventListener('timeupdate',()=>{if(!audio.duration)return;document.getElementById('progressFillM').style.width=(audio.currentTime/audio.duration*100)+'%';});
  function cambiarVolumen(){const s=document.getElementById('volumenM');if(s)audio.volume=s.value;}

  function initTilt(){
    document.querySelectorAll('.cat-card').forEach(card=>{
      if(card.dataset.tilt)return; card.dataset.tilt='1';
      card.addEventListener('mousemove',e=>{
        const r=card.getBoundingClientRect(),x=e.clientX-r.left,y=e.clientY-r.top;
        const cx=r.width/2,cy=r.height/2,rotY=((x-cx)/cx)*14,rotX=-((y-cy)/cy)*10;
        card.style.transform=`perspective(600px) rotateX(${rotX}deg) rotateY(${rotY}deg) scale(1.05) translateY(-5px)`;
        card.style.boxShadow=`0 2px 6px rgba(0,0,0,0.04), ${-rotY*0.8}px ${rotX*0.8+18}px 40px rgba(0,0,0,0.12)`;
        const icon=card.querySelector('.cat-icon');
        if(icon) icon.style.transform='translateZ(40px) scale(1.18) translateY(-3px)';
      });
      card.addEventListener('mouseleave',()=>{
        card.style.transform='perspective(600px) rotateX(0) rotateY(0) scale(1) translateY(0)';
        card.style.boxShadow='0 1px 4px rgba(0,0,0,0.05), 0 4px 16px rgba(0,0,0,0.04)';
        const icon=card.querySelector('.cat-icon');
        if(icon) icon.style.transform='';
      });
      card.addEventListener('mousedown',()=>{card.style.transform='perspective(600px) scale(0.97)';});
    });
  }

  let cfBooks=[],cfCurrent=0,cfView=localStorage.getItem('libView')||'grid';
  function setView(mode){cfView=mode;localStorage.setItem('libView',mode);document.getElementById('btnGrid').classList.toggle('active',mode==='grid');document.getElementById('btnCover').classList.toggle('active',mode==='cover');document.getElementById('booksInner').classList.toggle('cf-hidden',mode==='cover');document.getElementById('coverflowWrap').classList.toggle('active',mode==='cover');if(mode==='cover'&&cfBooks.length>0)cfRender();}
  function cfInit(libros){cfBooks=libros.filter(l=>l.url||l.video||l.imagen);cfCurrent=0;cfBuild();if(cfView==='cover'){setView('cover');}else{setView('grid');}}
  function cfBuild(){
    const stage=document.getElementById('cfStage'),dotsEl=document.getElementById('cfDots');
    stage.innerHTML='';dotsEl.innerHTML='';
    cfBooks.forEach((b,i)=>{
      const card=document.createElement('div');card.className='cf-card';
      const bg=b.imagen?`<img src="${b.imagen}" alt="${b.titulo}" onerror="this.parentElement.innerHTML='<div class=cf-fallback><svg width=44 height=44 viewBox=\\'0 0 24 24\\' fill=\\'none\\' stroke=\\'rgba(197,160,89,0.6)\\' stroke-width=\\'1.5\\'><path d=\\'M4 19.5A2.5 2.5 0 0 1 6.5 17H20\\'/><path d=\\'M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z\\'/></svg></div>';">`:`<div class="cf-fallback"><svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="rgba(197,160,89,0.6)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></div>`;
      card.innerHTML=bg+`<div class="cf-reflection"></div><div class="cf-label">${(b.titulo||'').substring(0,22)}</div><div class="cf-author">${(b.autor||'').substring(0,20)}</div>`;
      card.onclick=()=>cfGoTo(i);stage.appendChild(card);
      const dot=document.createElement('button');dot.className='cf-dot'+(i===cfCurrent?' active':'');dot.onclick=()=>cfGoTo(i);dotsEl.appendChild(dot);
    });
  }
  function cfRender(){
    if(!cfBooks.length)return;
    const cards=document.querySelectorAll('.cf-card'),dots=document.querySelectorAll('.cf-dot'),b=cfBooks[cfCurrent];
    document.getElementById('cfTitleBar').textContent='✦  '+(b.titulo||'').toUpperCase()+'  ✦';
    const openBtn=document.getElementById('cfOpenBtn'),url=b.url||b.video||'#',esAudio=b.subcategoria&&b.subcategoria.includes('Audio');
    openBtn.textContent=esAudio?'🎧 Escuchar':b.video?'▶ Ver video':'📖 Abrir libro';
    openBtn.dataset.url=url;openBtn.dataset.titulo=b.titulo||'';openBtn.dataset.autor=b.autor||'';
    openBtn.style.display=url!=='#'?'inline-block':'none';
    document.getElementById('cfPrev').disabled=cfCurrent===0;
    document.getElementById('cfNext').disabled=cfCurrent===cfBooks.length-1;
    cards.forEach((card,i)=>{
      const offset=i-cfCurrent,abs=Math.abs(offset);
      if(abs>2){card.style.opacity='0';card.style.pointerEvents='none';return;}
      card.style.pointerEvents='auto';
      const sign=offset===0?0:offset/abs,tx=offset*130,tz=abs===0?0:-abs*90,ry=offset===0?0:-sign*48;
      const scale=abs===0?1.2:abs===1?0.8:0.62,op=abs===0?1:abs===1?0.72:0.42,z=abs===0?10:abs===1?5:1;
      card.style.zIndex=z;card.style.opacity=op;
      card.style.transform=`translateX(${tx}px) translateZ(${tz}px) rotateY(${ry}deg) scale(${scale})`;
      card.style.boxShadow=abs===0?'0 20px 50px rgba(0,0,0,0.18), 0 0 0 1px rgba(197,160,89,0.25)':'0 6px 20px rgba(0,0,0,0.08)';
    });
    dots.forEach((d,i)=>d.classList.toggle('active',i===cfCurrent));
  }
  function cfMove(dir){cfGoTo(Math.max(0,Math.min(cfBooks.length-1,cfCurrent+dir)));}
  function cfGoTo(i){cfCurrent=i;cfRender();}
  function cfOpenCurrent(e){e.preventDefault();const btn=document.getElementById('cfOpenBtn');abrirVisor(btn.dataset.url,btn.dataset.titulo,btn.dataset.autor);}
  document.addEventListener('keydown',e=>{if(document.getElementById('coverflowWrap').classList.contains('active')){if(e.key==='ArrowLeft')cfMove(-1);if(e.key==='ArrowRight')cfMove(1);}});
  let cfTx0=0;
  document.addEventListener('touchstart',e=>{cfTx0=e.touches[0]?.clientX||0;});
  document.addEventListener('touchend',e=>{if(!document.getElementById('coverflowWrap').classList.contains('active'))return;const dx=(e.changedTouches[0]?.clientX||0)-cfTx0;if(Math.abs(dx)>40)cfMove(dx<0?1:-1);});

  buildCatsGrid();
  new MutationObserver(()=>{if(!document.getElementById('panelCats').classList.contains('slide-out'))setTimeout(initTilt,100);}).observe(document.getElementById('panelCats'),{attributes:true,attributeFilter:['class']});

</script>
</body>
</html>
