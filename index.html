<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biblioteca Virtual</title>
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100;0,200;0,300;0,400;0,600;0,700;1,300;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F8F5EE;
    --card-bg: #E8D5C4;
    --card-hover: #D9C3AF;
    --gold: #C5A059;
    --gold-light: #D4B06A;
    --gold-dark: #A07838;
    --glass: rgba(255,255,255,0.55);
    --glass-border: rgba(255,255,255,0.75);
    --glass-shadow: rgba(0,0,0,0.08);
    --text-dark: #1C1C1E;
    --text-mid: #3A3A3C;
    --text-light: #6C6C70;
    --text-gold: #C5A059;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:antialiased; }

  body {
    background: var(--bg);
    font-family: 'Josefin Sans', sans-serif;
    color: var(--text-dark);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ══ Noise texture overlay ══ */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: 0.4;
  }

  /* ══ Animaciones ══ */
  @keyframes fadeUp   { from{opacity:0;transform:translateY(20px);} to{opacity:1;transform:translateY(0);} }
  @keyframes fadeIn   { from{opacity:0;} to{opacity:1;} }
  @keyframes scaleIn  { from{opacity:0;transform:scale(0.92);} to{opacity:1;transform:scale(1);} }
  @keyframes float    { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-6px);} }
  @keyframes shimmer  { 0%{background-position:-200% center;} 100%{background-position:200% center;} }
  @keyframes loto-rotate { from{transform:rotate(0deg);} to{transform:rotate(360deg);} }
  @keyframes pulse-petal  { 0%,100%{filter:brightness(1);} 50%{filter:brightness(1.9) drop-shadow(0 0 5px rgba(197,160,89,0.9));} }
  @keyframes pulse-center { 0%,100%{box-shadow:0 0 8px rgba(197,160,89,0.4);} 50%{box-shadow:0 0 18px rgba(197,160,89,1);} }
  @keyframes float-up { 0%{transform:translateY(100vh);opacity:0;} 10%{opacity:0.3;} 90%{opacity:0.1;} 100%{transform:translateY(-20px);opacity:0;} }

  /* ══ Loto spinner ══ */
  .loto-spinner { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; z-index:3; pointer-events:none; transition:opacity 0.5s ease; }
  .loto-spinner.hidden { opacity:0; }
  .loto-petals { position:relative; width:52px; height:52px; animation:loto-rotate 3.5s linear infinite; }
  .petal { position:absolute; width:14px; height:23px; background:radial-gradient(ellipse at 50% 30%, rgba(197,160,89,0.95), rgba(197,160,89,0.15)); border-radius:50% 50% 50% 50% / 62% 62% 38% 38%; left:50%; top:50%; transform-origin:50% 100%; margin-left:-7px; margin-top:-23px; }
  .petal:nth-child(1){transform:rotate(0deg);   animation:pulse-petal 1.6s ease-in-out infinite 0.00s;}
  .petal:nth-child(2){transform:rotate(45deg);  animation:pulse-petal 1.6s ease-in-out infinite 0.20s;}
  .petal:nth-child(3){transform:rotate(90deg);  animation:pulse-petal 1.6s ease-in-out infinite 0.40s;}
  .petal:nth-child(4){transform:rotate(135deg); animation:pulse-petal 1.6s ease-in-out infinite 0.60s;}
  .petal:nth-child(5){transform:rotate(180deg); animation:pulse-petal 1.6s ease-in-out infinite 0.80s;}
  .petal:nth-child(6){transform:rotate(225deg); animation:pulse-petal 1.6s ease-in-out infinite 1.00s;}
  .petal:nth-child(7){transform:rotate(270deg); animation:pulse-petal 1.6s ease-in-out infinite 1.20s;}
  .petal:nth-child(8){transform:rotate(315deg); animation:pulse-petal 1.6s ease-in-out infinite 1.40s;}
  .loto-center { position:absolute; width:11px; height:11px; background:radial-gradient(circle, var(--gold-light), var(--gold)); border-radius:50%; top:50%; left:50%; transform:translate(-50%,-50%); box-shadow:0 0 10px rgba(197,160,89,0.7); animation:pulse-center 1.6s ease-in-out infinite; }

  /* ══ Partículas ══ */
  #particles { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; overflow:hidden; }
  .particle { position:absolute; border-radius:50%; opacity:0; animation:float-up linear infinite; background:var(--gold); }

  /* ══ Music player ══ */
  #panelMusica { display:none !important; }
  #panelMusicaMobile {
    position:fixed; bottom:24px; right:24px;
    display:flex; flex-direction:column; align-items:flex-end;
    gap:12px; z-index:500;
  }
  #inicioMusicaM {
    width:54px; height:54px; border-radius:50%;
    background: var(--glass);
    backdrop-filter: blur(20px) saturate(1.8);
    -webkit-backdrop-filter: blur(20px) saturate(1.8);
    border: 1.5px solid var(--glass-border);
    color: var(--gold); font-size:20px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12), inset 0 1px 0 rgba(255,255,255,0.8);
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s;
  }
  #inicioMusicaM:hover { transform:scale(1.12); box-shadow:0 12px 40px rgba(0,0,0,0.18), inset 0 1px 0 rgba(255,255,255,0.8); }

  .player-widget { display:none; flex-direction:column; align-items:center; gap:8px; width:100%; }
  .player-progress { width:100%; height:3px; background:rgba(197,160,89,0.2); border-radius:2px; cursor:pointer; }
  .player-progress-bar { height:100%; background:linear-gradient(90deg,var(--gold),var(--gold-light)); border-radius:2px; width:0%; transition:width 0.5s linear; }
  .player-controls { display:flex; align-items:center; gap:12px; }
  .player-btn { background:none; border:none; color:rgba(197,160,89,0.5); font-size:14px; cursor:pointer; transition:all 0.2s; }
  .player-btn:hover { color:var(--gold); transform:scale(1.15); }
  .player-btn.disabled { opacity:0.2; cursor:default; pointer-events:none; }
  .player-btn.play-btn { width:34px; height:34px; border-radius:50%; background:var(--gold); color:white; font-size:13px; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 12px rgba(197,160,89,0.4); }
  .mobile-vol-row { display:none; align-items:center; gap:8px; width:100%; justify-content:center; }
  .mobile-vol-row span { font-size:13px; }
  #volumenM { width:100px; accent-color:var(--gold); cursor:pointer; height:3px; }
  .player-widget#playerWidgetM {
    background: var(--glass);
    backdrop-filter: blur(20px) saturate(1.8);
    -webkit-backdrop-filter: blur(20px) saturate(1.8);
    border: 1.5px solid var(--glass-border);
    border-radius:18px; padding:14px 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.1), inset 0 1px 0 rgba(255,255,255,0.8);
    min-width:190px;
  }

  /* ══ Layout ══ */
  .app { position:relative; z-index:1; display:flex; min-height:100vh; }

  .panel-cats {
    width:100%; flex-shrink:0; display:flex; flex-direction:column;
    align-items:center; min-height:100vh;
    transition:transform 0.55s cubic-bezier(0.77,0,0.18,1), opacity 0.4s ease;
    will-change:transform,opacity;
  }
  .panel-cats.slide-out { transform:translateX(-100%); opacity:0; pointer-events:none; position:absolute; top:0; left:0; width:100%; }

  /* ══ Sidebar ══ */
  .app-header {
    width:100%; display:flex; flex-direction:column; align-items:center;
    padding:48px 28px 32px;
    background: var(--glass);
    backdrop-filter: blur(24px) saturate(1.8);
    -webkit-backdrop-filter: blur(24px) saturate(1.8);
    border-bottom: 1.5px solid var(--glass-border);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.9);
    animation: fadeUp 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
    position: relative;
  }

  .app-logo {
    width:150px; height:150px; border-radius:50%; object-fit:cover;
    border: 2px solid rgba(255,255,255,0.8);
    box-shadow:
      0 0 0 1px rgba(197,160,89,0.3),
      0 8px 32px rgba(0,0,0,0.12),
      0 2px 8px rgba(0,0,0,0.08),
      inset 0 1px 0 rgba(255,255,255,0.5);
    margin-bottom:20px; cursor:pointer;
    transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.4s ease;
    animation: float 6s ease-in-out infinite;
  }
  .app-logo:hover {
    transform: scale(1.06);
    box-shadow:
      0 0 0 1px rgba(197,160,89,0.5),
      0 16px 48px rgba(0,0,0,0.18),
      0 4px 16px rgba(197,160,89,0.2),
      inset 0 1px 0 rgba(255,255,255,0.5);
    animation: none;
  }

  .app-ornament { display:none; }

  .app-title {
    font-family:'Josefin Sans', sans-serif;
    font-size:12px; letter-spacing:6px; color:var(--text-gold);
    text-transform:uppercase; line-height:2.2; text-align:center;
    font-weight:700;
  }
  .app-quote {
    font-family:'Cormorant Garamond', serif;
    font-style:italic; font-size:13px;
    color:#2d2d2d; margin-top:10px; text-align:center;
    line-height:1.6;
  }

  /* ══ Buscador estilo iOS ══ */
  .search-box-wrap { width:100%; margin-top:20px; }
  .search-box {
    width:100%; display:flex; align-items:center; gap:10px;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1.5px solid rgba(255,255,255,0.9);
    border-radius:14px; padding:11px 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06), inset 0 1px 0 rgba(255,255,255,0.9);
    transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  .search-box:focus-within {
    border-color: rgba(197,160,89,0.6);
    box-shadow: 0 4px 24px rgba(197,160,89,0.15), inset 0 1px 0 rgba(255,255,255,0.9);
    transform: translateY(-1px) scale(1.01);
    background: rgba(255,255,255,0.85);
  }
  .search-box input {
    flex:1; background:none; border:none; outline:none;
    color:var(--text-dark); font-family:'Josefin Sans', sans-serif;
    font-size:13px; letter-spacing:0.3px;
  }
  .search-box input::placeholder { color:rgba(100,80,40,0.4); font-style:italic; }
  .search-box-icon { font-size:14px; color:rgba(197,160,89,0.7); flex-shrink:0; }
  .search-box-clear { background:none; border:none; color:rgba(100,80,40,0.4); font-size:13px; cursor:pointer; padding:2px; transition:all 0.2s; display:none; }
  .search-box-clear.visible { display:block; }
  .search-box-clear:hover { color:var(--gold); transform:scale(1.2); }

  /* ══ Label colecciones ══ */
  .cats-label {
    font-family:'Josefin Sans', sans-serif;
    font-size:10px; letter-spacing:5px; color:var(--text-gold);
    text-transform:uppercase; width:100%; padding:28px 28px 16px;
    animation:fadeUp 0.7s ease 0.2s both;
    display:flex; align-items:center; gap:14px; font-weight:700;
  }
  .cats-label::after {
    content:''; flex:1; height:2px;
    background:linear-gradient(90deg, rgba(197,160,89,0.7), transparent);
    border-radius:1px;
  }

  /* ══ Grid categorías ══ */
  .cats-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; padding:0 20px 32px; width:100%; animation:fadeUp 0.7s ease 0.3s both; }
  .cats-grid-wrap.hidden { display:none; }

  /* ══ Tarjeta categoría — Apple style ══ */
  .cat-card {
    background: var(--card-bg);
    border: none;
    border-radius:20px;
    padding:24px 14px 20px;
    cursor:pointer;
    display:flex; flex-direction:column; align-items:center; gap:12px;
    position:relative; overflow:hidden;
    /* Sombra Apple: capas múltiples */
    box-shadow:
      0 1px 0 rgba(255,255,255,0.4) inset,
      0 4px 16px rgba(0,0,0,0.08),
      0 1px 4px rgba(0,0,0,0.06);
    transition:
      transform 0.5s cubic-bezier(0.34,1.56,0.64,1),
      box-shadow 0.4s cubic-bezier(0.25,0.46,0.45,0.94),
      background 0.3s ease;
    animation: scaleIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  /* Brillo interno superior — efecto cristal Apple */
  .cat-card::before {
    content:'';
    position:absolute; top:0; left:0; right:0; height:50%;
    background:linear-gradient(180deg, rgba(255,255,255,0.25) 0%, transparent 100%);
    border-radius:20px 20px 0 0;
    pointer-events:none;
  }

  /* Reflejo sutil en hover */
  .cat-card::after {
    content:'';
    position:absolute; inset:0;
    background:radial-gradient(circle at 50% 0%, rgba(255,255,255,0.18) 0%, transparent 70%);
    opacity:0;
    transition:opacity 0.4s ease;
    pointer-events:none;
    border-radius:20px;
  }

  .cat-card:hover {
    transform: translateY(-8px) scale(1.04);
    background: var(--card-hover);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.4) inset,
      0 20px 50px rgba(0,0,0,0.15),
      0 8px 20px rgba(0,0,0,0.1),
      0 0 0 0.5px rgba(255,255,255,0.3);
  }
  .cat-card:hover::after { opacity:1; }

  .cat-card:active {
    transform: scale(0.96) translateY(-2px);
    transition: transform 0.12s cubic-bezier(0.25,0.46,0.45,0.94);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.3) inset,
      0 6px 20px rgba(0,0,0,0.1);
  }

  /* ══ Icono dorado → color original ══ */
  .cat-icon {
    font-size:36px;
    display:block;
    filter: sepia(1) saturate(3.5) hue-rotate(5deg) brightness(0.88);
    transition:
      filter 0.55s cubic-bezier(0.25,0.46,0.45,0.94),
      transform 0.55s cubic-bezier(0.34,1.56,0.64,1);
    transform-origin: center bottom;
    will-change: filter, transform;
  }
  .cat-card:hover .cat-icon {
    filter: none;
    transform: scale(1.28) translateY(-4px) rotate(-3deg);
  }

  .cat-name {
    font-family:'Josefin Sans', sans-serif;
    font-size:9px; letter-spacing:1.5px;
    color:var(--text-dark); opacity:0.8;
    text-transform:uppercase; text-align:center;
    line-height:1.6; font-weight:600;
    transition: opacity 0.3s, letter-spacing 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  .cat-card:hover .cat-name { opacity:1; letter-spacing:2px; }

  /* ══ Panel libros ══ */
  .panel-books {
    position:fixed; inset:0; display:flex; flex-direction:column;
    background: var(--bg);
    z-index:10;
    transform:translateX(100%); opacity:0;
    transition:transform 0.55s cubic-bezier(0.77,0,0.18,1), opacity 0.4s ease;
    will-change:transform,opacity; overflow-y:auto; padding-bottom:80px;
  }
  .panel-books.slide-in { transform:translateX(0); opacity:1; }
  .books-loto { position:fixed; inset:0; background-image:url('Fondo/Loto.png'); background-size:cover; background-position:center; opacity:0.04; pointer-events:none; z-index:0; }

  .books-header {
    position:sticky; top:0; z-index:5;
    display:flex; align-items:center; gap:16px; padding:16px 28px;
    background: rgba(248,245,238,0.85);
    backdrop-filter: blur(24px) saturate(1.8);
    -webkit-backdrop-filter: blur(24px) saturate(1.8);
    border-bottom: 2px solid rgba(197,160,89,0.6);
    box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset, 0 4px 20px rgba(0,0,0,0.06);
  }
  .back-logo {
    width:100px; height:100px; border-radius:50%; object-fit:cover;
    border:2px solid rgba(255,255,255,0.8);
    box-shadow: 0 0 0 1px rgba(197,160,89,0.3), 0 4px 16px rgba(0,0,0,0.1);
    cursor:pointer; flex-shrink:0;
    transition:transform 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }
  .back-logo:hover { transform:scale(1.08) rotate(-3deg); }
  .books-header-info { flex:1; }
  .books-cat-name { font-family:'Josefin Sans', sans-serif; font-size:11px; letter-spacing:4px; color:var(--text-gold); text-transform:uppercase; font-weight:700; }
  .books-count { font-size:12px; color:var(--text-light); margin-top:3px; font-style:italic; font-family:'Cormorant Garamond', serif; }
  .back-btn {
    padding:10px 22px;
    background: rgba(255,255,255,0.6);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    border:1.5px solid rgba(255,255,255,0.8);
    border-radius:50px; color:var(--text-gold);
    font-family:'Josefin Sans', sans-serif; font-size:10px;
    letter-spacing:2px; cursor:pointer; font-weight:700;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06), inset 0 1px 0 rgba(255,255,255,0.9);
    transition:all 0.45s cubic-bezier(0.34,1.56,0.64,1);
    white-space:nowrap;
  }
  .back-btn:hover {
    background:var(--gold); color:white;
    border-color:var(--gold);
    transform:translateY(-3px) scale(1.05);
    box-shadow:0 8px 28px rgba(197,160,89,0.4), inset 0 1px 0 rgba(255,255,255,0.3);
  }

  /* ══ Grid libros ══ */
  .books-inner { position:relative; z-index:1; display:grid; grid-template-columns:repeat(2,1fr); gap:18px; padding:28px 24px; }
  @media(min-width:500px) { .books-inner { grid-template-columns:repeat(3,1fr); } }
  @media(min-width:768px) { .books-inner { grid-template-columns:repeat(4,1fr); max-width:960px; padding:32px 32px; gap:22px; } }
  @media(min-width:1100px) { .books-inner { grid-template-columns:repeat(5,1fr); max-width:1200px; } }

  .book-card {
    background: var(--glass);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1.5px solid var(--glass-border);
    border-radius:18px; overflow:hidden; cursor:pointer;
    transition:all 0.45s cubic-bezier(0.34,1.56,0.64,1);
    animation:scaleIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    max-width:280px; width:100%; display:flex; flex-direction:column;
    box-shadow: 0 4px 20px rgba(0,0,0,0.07), 0 1px 4px rgba(0,0,0,0.05), inset 0 1px 0 rgba(255,255,255,0.9);
  }
  .book-card:hover {
    transform:translateY(-8px) scale(1.02);
    box-shadow: 0 20px 50px rgba(0,0,0,0.14), 0 8px 20px rgba(0,0,0,0.08), inset 0 1px 0 rgba(255,255,255,0.9);
    border-color:rgba(197,160,89,0.5);
  }
  .book-cover-wrap { width:100%; padding-top:110%; position:relative; overflow:hidden; background:linear-gradient(135deg,#e0d5c5,#ccc0aa); }
  .book-cover-wrap img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; transition:transform 0.5s cubic-bezier(0.34,1.56,0.64,1), opacity 0.8s ease; opacity:0; }
  .book-cover-wrap img.img-loaded { opacity:1; }
  .book-card:hover .book-cover-wrap img { transform:scale(1.08); }
  .book-info { padding:14px 14px 12px; display:flex; flex-direction:column; flex:1; }
  .book-title { font-family:'Josefin Sans', sans-serif; font-weight:700; font-size:12px; color:var(--text-dark); line-height:1.4; margin-bottom:4px; letter-spacing:0.3px; }
  .book-author { font-size:11px; color:var(--text-light); font-style:italic; margin-bottom:auto; padding-bottom:12px; font-family:'Cormorant Garamond', serif; }
  .book-btn {
    display:block; width:100%; padding:7px;
    background: rgba(197,160,89,0.12);
    color:var(--gold-dark); border:1.5px solid rgba(197,160,89,0.35);
    border-radius:10px; cursor:pointer;
    font-family:'Josefin Sans', sans-serif; font-size:8px;
    letter-spacing:1.5px; text-transform:uppercase;
    transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);
    text-decoration:none; text-align:center; font-weight:700;
  }
  .book-btn:hover { background:var(--gold); color:white; border-color:transparent; transform:translateY(-2px); box-shadow:0 6px 18px rgba(197,160,89,0.4); }

  /* ══ Resultados búsqueda ══ */
  .search-results { display:none; animation:fadeUp 0.35s ease both; }
  .search-results.visible { display:block; }
  .sr-meta { display:flex; align-items:baseline; gap:10px; margin-bottom:18px; padding-bottom:12px; border-bottom:2px solid rgba(197,160,89,0.5); }
  .sr-count { font-family:'Josefin Sans', sans-serif; font-size:9px; letter-spacing:3px; color:var(--text-light); text-transform:uppercase; font-weight:700; }
  .sr-query { font-style:italic; font-size:14px; color:var(--gold); font-family:'Cormorant Garamond', serif; }
  .sr-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(140px,1fr)); gap:14px; }

  .sr-card {
