<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biblioteca Virtual</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Cinzel:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- MUSICA -->
<audio id="musicaFondo" loop>
  <source src="Audio/Musica_fondo.mp3" type="audio/mpeg">
</audio>

<!-- PARTICULAS Y FONDO -->
<div id="particles"></div>
<div id="lotusBg"><img src="Fondo/LotoN.png" /></div>

<!-- PANEL MUSICA DESKTOP -->
<div id="panelMusica">
  <div class="music-label">♪ Ambiente</div>
  <button id="inicioMusica" onclick="iniciarMusica()">🎵 ¡Escúchame!</button>
  <button id="botonMusica" onclick="toggleAudio()">🔊</button>
  <input type="range" id="volumenControl" min="0" max="1" step="0.01" value="0.5" oninput="cambiarVolumen()">
</div>

<!-- PANEL MUSICA MÓVIL -->
<div id="panelMusicaMobile">
  <div class="music-label-m">♪ Ambiente</div>
  <button id="inicioMusicaM" onclick="iniciarMusica()">🎵 ¡Escúchame!</button>
  <button id="botonMusicaM" onclick="toggleAudio()">🔊</button>
  <input type="range" id="volumenM" min="0" max="1" step="0.01" value="0.5" oninput="cambiarVolumen()">
</div>

<div class="app">

  <!-- PANEL CATEGORIAS -->
  <div class="panel-cats" id="panelCats">
    <div class="cats-header">
      <h2>📚 Categorías</h2>
    </div>
    <div class="cats-grid" id="catsGrid"></div>
  </div>

  <!-- PANEL LIBROS -->
  <div class="panel-books" id="panelBooks">
    <div class="books-header">
      <img class="back-logo" src="Fondo/Escuela.png" alt="Inicio" onclick="volverInicio()">
      <div class="books-header-info">
        <div class="books-cat-name" id="booksCatName"></div>
        <div class="books-count" id="booksCount"></div>
      </div>
      <button class="back-btn" onclick="volverInicio()">← Volver</button>
    </div>
    <div class="books-inner" id="booksInner"></div>
  </div>

</div>

<!-- JS -->
<script src="js/libros.js"></script>
<script>
  // GENERAR CATEGORIAS AUTOMATICAMENTE
  const catsGrid = document.getElementById('catsGrid');
  const categoriasUnicas = [...new Set(libros.map(l => l.categoria))];

  categoriasUnicas.forEach(cat => {
    const div = document.createElement('div');
    div.className = 'cat-card';
    div.textContent = cat;
    div.onclick = () => abrirCategoria(cat, '📖');
    catsGrid.appendChild(div);
  });
</script>

</body>
</html>
